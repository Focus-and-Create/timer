<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Melody</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #faf5e8;
            --surface: #fff;
            --ink: #241f1a;
            --ink-soft: #5a4f44;
            --muted: #9a8d80;
            --pink: #ff7eb0;
            --mint: #7fe3c8;
            --lav: #c9b3ff;
            --peach: #ffc585;
            --red: #ff5a5a;
            --holo: linear-gradient(120deg, #ffd1f0 0%, #c9e8ff 25%, #d6ffd9 45%, #fff4c2 65%, #ffc6ec 85%, #a8d4ff 100%);
            --holo-strong: linear-gradient(120deg, #ff7eb0 0%, #7fc8ff 22%, #7fe3c8 44%, #fff08a 66%, #c9b3ff 88%, #ff7eb0 100%);
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: .22;
            background-image: radial-gradient(rgba(36,31,26,.2) 1px, transparent 1px);
            background-size: 22px 22px;
            mix-blend-mode: multiply;
            z-index: 0;
        }

        /* ── Nav ── */
        .app-nav {
            position: relative; z-index: 2;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.8rem 1.5rem;
            border-bottom: 1.5px solid var(--ink);
            background: var(--bg);
        }

        .nav-logo {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px;
        }

        .nav-logo .holo-text {
            background: var(--holo-strong); background-size: 300% 100%;
            -webkit-background-clip: text; background-clip: text; color: transparent;
            animation: holoShift 6s linear infinite;
        }

        @keyframes holoShift {
            from { background-position: 0 0; }
            to   { background-position: 300% 0; }
        }

        .nav-tabs { display: flex; gap: 4px; }

        .nav-tab {
            padding: 0.4rem 1.1rem;
            border: 1.5px solid var(--ink); border-radius: 99px;
            background: none; color: var(--ink-soft);
            font-size: 0.82rem; font-weight: 600; cursor: pointer;
            transition: all 0.15s; letter-spacing: 0.02em;
        }
        .nav-tab:hover { background: rgba(36,31,26,.06); }
        .nav-tab.active { background: var(--ink); color: var(--bg); }

        .week-badge {
            font-size: 0.75rem; color: var(--muted);
            display: flex; align-items: center; gap: 0.4rem;
        }
        .week-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--pink); box-shadow: 0 0 6px var(--pink);
        }

        /* ── Views ── */
        .view { display: none; position: relative; z-index: 1; }
        .view.active { display: flex; flex-direction: column; align-items: center; }

        /* ── Timer View ── */
        #timerView { padding: 1.4rem 1.5rem 2rem; min-height: calc(100vh - 57px); }

        /* Melody track */
        .melody-track-wrap { width: 100%; max-width: 520px; margin-bottom: 1.2rem; }

        .track-header {
            display: flex; justify-content: space-between; align-items: baseline;
            margin-bottom: 0.5rem;
        }

        .track-label {
            font-size: 0.65rem; letter-spacing: 0.25em;
            text-transform: uppercase; color: var(--muted); font-weight: 600;
        }

        .track-count { font-family: 'Caveat', cursive; font-size: 1rem; color: var(--ink-soft); }

        .track-slots {
            display: flex; gap: 5px;
            background: var(--surface);
            border: 1.5px solid var(--ink); border-radius: 12px;
            padding: 10px 12px;
            box-shadow: 3px 3px 0 var(--ink);
        }

        .slot {
            flex: 1; height: 20px; border-radius: 6px;
            border: 1.5px solid rgba(36,31,26,.15);
            background: rgba(36,31,26,.04);
            transition: all 0.3s; position: relative; overflow: hidden;
        }

        .slot.filled {
            border-color: transparent;
            background: var(--holo); background-size: 300% 100%;
            animation: holoShift 4s linear infinite;
        }

        .slot.filled.new {
            animation: holoShift 4s linear infinite, slotPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }

        @keyframes slotPop {
            from { transform: scaleY(0); opacity: 0; }
            to   { transform: scaleY(1); opacity: 1; }
        }

        /* Timer */
        .timer-wrapper {
            position: relative; width: 210px; height: 210px; margin-bottom: 0.9rem;
        }

        .timer-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
        .timer-track { fill: none; stroke: rgba(36,31,26,.1); stroke-width: 10; }
        .timer-progress {
            fill: none; stroke: url(#timerGrad); stroke-width: 10;
            stroke-linecap: round; stroke-dasharray: 706.86; stroke-dashoffset: 0;
        }
        .timer-glow {
            fill: none; stroke: url(#timerGrad); stroke-width: 20;
            stroke-linecap: round; stroke-dasharray: 706.86; stroke-dashoffset: 0;
            opacity: 0.12; filter: blur(5px);
        }

        .timer-center {
            position: absolute; inset: 0;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
        }

        .timer-display {
            font-size: 2.8rem; font-weight: 700; letter-spacing: -3px;
            font-variant-numeric: tabular-nums; color: var(--ink); line-height: 1;
        }

        .timer-status {
            font-size: 0.65rem; letter-spacing: 0.25em;
            text-transform: uppercase; color: var(--muted); margin-top: 4px;
        }

        /* Duration */
        .duration-row { display: flex; gap: 6px; margin-bottom: 0.9rem; }

        .dur-btn {
            padding: 0.3rem 0.85rem; border-radius: 99px;
            border: 1.5px solid var(--ink); background: var(--surface);
            color: var(--ink-soft); font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: all 0.15s;
            box-shadow: 2px 2px 0 var(--ink);
        }
        .dur-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
        .dur-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }
        .dur-btn.active { background: var(--pink); color: #fff; border-color: var(--ink); }
        .dur-btn:disabled { opacity: 0.4; pointer-events: none; }

        /* Controls */
        .controls { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 1.2rem; flex-wrap: wrap; justify-content: center; }

        .btn-start {
            width: 66px; height: 66px; border-radius: 50%;
            border: 2px solid var(--ink); background: var(--pink); color: #fff;
            font-size: 1.4rem; cursor: pointer;
            box-shadow: 4px 4px 0 var(--ink); transition: all 0.12s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-start:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
        .btn-start:active { transform: translate(2px, 2px);  box-shadow: 2px 2px 0 var(--ink); }
        .btn-start.running { background: var(--mint); }

        .btn-outline {
            padding: 0.45rem 1.1rem; border-radius: 99px;
            border: 1.5px solid var(--ink); background: var(--surface);
            color: var(--ink-soft); font-size: 0.82rem; font-weight: 600;
            cursor: pointer; box-shadow: 2px 2px 0 var(--ink); transition: all 0.12s;
        }
        .btn-outline:hover  { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
        .btn-outline:active { transform: translate(1px, 1px);  box-shadow: 1px 1px 0 var(--ink); }
        .btn-outline.stop { background: #fff3f7; border-color: var(--pink); color: var(--pink); display: none; }

        /* Force end (abandon) button */
        .btn-abandon {
            display: none;
            padding: 0.45rem 1.1rem; border-radius: 99px;
            border: 1.5px solid var(--red); background: #fff5f5;
            color: var(--red); font-size: 0.82rem; font-weight: 600;
            cursor: pointer; box-shadow: 2px 2px 0 var(--red); transition: all 0.12s;
        }
        .btn-abandon:hover  { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--red); }
        .btn-abandon:active { transform: translate(1px, 1px);  box-shadow: 1px 1px 0 var(--red); }

        /* Notes section */
        .notes-section { width: 100%; max-width: 520px; }

        .notes-section-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 0.5rem;
        }

        .notes-grid {
            display: flex; flex-wrap: wrap; gap: 6px;
            padding: 1rem; background: var(--surface);
            border: 1.5px solid var(--ink); border-radius: 16px;
            min-height: 72px; align-items: center;
            box-shadow: 3px 3px 0 var(--ink);
        }

        .empty-hint {
            width: 100%; text-align: center;
            font-family: 'Caveat', cursive; font-size: 1rem; color: var(--muted);
        }

        .note-chip {
            width: 40px; height: 40px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; border: 1.5px solid var(--ink);
            animation: chipIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
            cursor: default; transition: transform 0.15s;
            box-shadow: 2px 2px 0 var(--ink);
        }
        .note-chip:hover { transform: scale(1.18) rotate(5deg); }
        .note-chip.lit { animation: chipLit 0.4s cubic-bezier(0.34,1.56,0.64,1); }

        @keyframes chipIn {
            from { transform: scale(0) rotate(-30deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg);   opacity: 1; }
        }
        @keyframes chipLit {
            0%   { transform: scale(1); filter: brightness(1); }
            45%  { transform: scale(1.5); filter: brightness(1.3) saturate(1.5); }
            100% { transform: scale(1); filter: none; }
        }

        .btn-play-melody {
            margin-top: 0.6rem; width: 100%; padding: 0.6rem;
            border-radius: 10px; border: 1.5px dashed rgba(36,31,26,.25);
            background: none; color: var(--muted); font-size: 0.85rem;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-play-melody:hover { border-color: var(--pink); color: var(--pink); background: rgba(255,126,176,.05); }
        .btn-play-melody:disabled { opacity: 0.35; pointer-events: none; }

        .banner {
            display: none; margin-top: 0.7rem; padding: 0.9rem 1rem;
            text-align: center; background: var(--holo); background-size: 300%;
            animation: holoShift 6s linear infinite;
            border: 1.5px solid var(--ink); border-radius: 12px;
            box-shadow: 3px 3px 0 var(--ink);
            font-family: 'Caveat', cursive; font-size: 1.1rem; font-weight: 700;
        }
        .banner.show { display: block; }

        /* ── Session Complete Overlay ── */
        #sessionComplete {
            position: fixed; inset: 0; z-index: 100;
            background: rgba(20,15,10,.92);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 2rem;
            opacity: 0; pointer-events: none; transition: opacity 0.4s;
        }
        #sessionComplete.show { opacity: 1; pointer-events: auto; }

        .confetti-piece {
            position: absolute; pointer-events: none; font-size: 1.4rem;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0%   { transform: translate(0, -20px) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), 100vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        .holo-disk {
            width: 160px; height: 160px; border-radius: 50%;
            background: var(--holo-strong); background-size: 300% 100%;
            border: 3px solid var(--ink);
            box-shadow: 0 0 40px rgba(255,126,176,.4), 6px 6px 0 var(--ink);
            display: flex; align-items: center; justify-content: center;
            margin-bottom: 1.5rem;
            animation: holoShift 3s linear infinite, diskIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
            cursor: pointer;
        }
        @keyframes diskIn {
            from { transform: scale(0) rotate(-180deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .holo-disk-inner {
            width: 100px; height: 100px; border-radius: 50%;
            background: #fff; border: 2px solid var(--ink);
            display: flex; align-items: center; justify-content: center; font-size: 3rem;
            transition: transform 0.2s;
        }
        .holo-disk:hover .holo-disk-inner { transform: scale(1.1); }

        .complete-title {
            font-family: 'Caveat', cursive; font-size: 2.2rem; font-weight: 700;
            color: #fff; text-align: center; margin-bottom: 0.3rem;
        }
        .complete-sub {
            font-size: 0.85rem; color: rgba(255,255,255,.55);
            letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 0.6rem;
        }
        .complete-hint {
            font-size: 0.75rem; color: rgba(255,255,255,.35);
            margin-bottom: 1.5rem;
        }

        .complete-track {
            display: flex; gap: 4px; margin-bottom: 2rem;
            padding: 8px 12px; background: rgba(255,255,255,.08);
            border-radius: 10px; border: 1px solid rgba(255,255,255,.12);
        }
        .complete-slot {
            width: 18px; height: 18px; border-radius: 5px;
            background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.15);
        }
        .complete-slot.filled {
            background: var(--holo); background-size: 300%;
            animation: holoShift 4s linear infinite; border-color: transparent;
        }
        .complete-slot.new-one {
            background: var(--holo-strong); background-size: 300%;
            animation: holoShift 2s linear infinite, slotNewPulse 1s ease-in-out infinite;
            border-color: transparent;
        }
        @keyframes slotNewPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,126,176,.6); }
            50% { box-shadow: 0 0 0 5px rgba(255,126,176,0); }
        }

        .complete-btns { display: flex; gap: 0.75rem; }

        .btn-complete-primary {
            padding: 0.75rem 1.8rem; border-radius: 99px;
            border: 2px solid var(--ink); background: var(--pink); color: #fff;
            font-size: 0.95rem; font-weight: 700; cursor: pointer;
            box-shadow: 4px 4px 0 rgba(255,255,255,.2); transition: all 0.12s;
        }
        .btn-complete-primary:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 rgba(255,255,255,.2); }
        .btn-complete-primary:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 rgba(255,255,255,.2); }

        .btn-complete-secondary {
            padding: 0.75rem 1.4rem; border-radius: 99px;
            border: 1.5px solid rgba(255,255,255,.25); background: rgba(255,255,255,.1);
            color: rgba(255,255,255,.8); font-size: 0.9rem; cursor: pointer; transition: all 0.15s;
        }
        .btn-complete-secondary:hover { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.4); }

        /* ── Collection View ── */
        #collectionView { padding: 1.5rem; min-height: calc(100vh - 57px); }

        .collection-title {
            font-family: 'Caveat', cursive; font-size: 1.8rem; font-weight: 700;
            margin-bottom: 0.3rem; align-self: flex-start; max-width: 560px; width: 100%;
        }
        .collection-sub {
            font-size: 0.8rem; color: var(--muted); margin-bottom: 1.5rem;
            align-self: flex-start; max-width: 560px; width: 100%;
        }

        .cassette-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem; width: 100%; max-width: 560px;
        }

        .cassette {
            background: var(--surface); border: 1.5px solid var(--ink);
            border-radius: 12px; padding: 14px;
            box-shadow: 4px 4px 0 var(--ink); cursor: pointer; transition: all 0.12s;
        }
        .cassette:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
        .cassette:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }
        .cassette.in-progress { border-style: dashed; box-shadow: 4px 4px 0 var(--muted); }

        .cassette-window {
            border: 1px solid rgba(36,31,26,.15); border-radius: 6px;
            height: 52px; display: flex; align-items: center;
            justify-content: space-around; padding: 0 10px; margin-bottom: 8px;
        }
        .reel {
            width: 28px; height: 28px; border-radius: 50%;
            border: 2px solid var(--ink); position: relative;
            display: flex; align-items: center; justify-content: center;
        }
        .reel::after {
            content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--ink);
        }
        .cassette.playing .reel { animation: reelSpin 2s linear infinite; }
        @keyframes reelSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .cassette-tape-line { height: 2px; width: 30px; background: var(--ink); opacity: 0.3; }

        .cassette-dots { display: flex; gap: 3px; margin-bottom: 8px; }
        .cassette-dot {
            flex: 1; height: 5px; border-radius: 3px;
            background: rgba(36,31,26,.08); border: 1px solid rgba(36,31,26,.1);
        }
        .cassette-dot.filled {
            background: var(--holo); background-size: 300%;
            animation: holoShift 4s linear infinite; border-color: transparent;
        }

        .cassette-label {
            font-family: 'Caveat', cursive; font-size: 0.95rem; font-weight: 600;
            color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .cassette-melody-name {
            font-size: 0.65rem; color: var(--muted); margin-top: 1px; letter-spacing: 0.05em;
        }
        .cassette-week { font-size: 0.7rem; color: var(--muted); margin-top: 2px; }

        .cassette-play-btn {
            display: flex; align-items: center; gap: 4px; margin-top: 8px;
            padding: 0.3rem 0.6rem; border-radius: 99px;
            border: 1px solid var(--ink); background: none; font-size: 0.75rem;
            cursor: pointer; transition: all 0.15s; width: 100%; justify-content: center;
        }
        .cassette-play-btn:hover { background: var(--pink); color: #fff; border-color: var(--pink); }
        .cassette.in-progress .cassette-play-btn { display: none; }

        .empty-collection {
            text-align: center; padding: 3rem 1rem;
            color: var(--muted); font-family: 'Caveat', cursive; font-size: 1.2rem;
        }

        /* ── Settings View ── */
        #settingsView { padding: 1.5rem; min-height: calc(100vh - 57px); }

        .settings-title {
            font-family: 'Caveat', cursive; font-size: 1.8rem; font-weight: 700;
            margin-bottom: 1.5rem; align-self: flex-start; max-width: 560px; width: 100%;
        }

        .settings-section {
            width: 100%; max-width: 560px; margin-bottom: 2rem;
        }

        .settings-section-label {
            font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase;
            color: var(--muted); font-weight: 600; margin-bottom: 0.7rem; display: block;
        }

        .melody-cards {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 0.75rem;
        }

        .melody-card {
            background: var(--surface); border: 1.5px solid var(--ink);
            border-radius: 12px; padding: 14px 14px 12px;
            box-shadow: 3px 3px 0 var(--ink); cursor: pointer; transition: all 0.12s;
            position: relative;
        }
        .melody-card:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
        .melody-card:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }

        .melody-card.active {
            background: var(--holo); background-size: 300% 100%;
            animation: holoShift 5s linear infinite;
            box-shadow: 4px 4px 0 var(--ink);
        }

        .melody-card-emoji { font-size: 1.8rem; margin-bottom: 6px; display: block; }
        .melody-card-name {
            font-family: 'Caveat', cursive; font-size: 1.05rem; font-weight: 700;
            color: var(--ink); display: block; margin-bottom: 2px;
        }
        .melody-card-desc { font-size: 0.72rem; color: var(--ink-soft); }

        .melody-card-check {
            position: absolute; top: 8px; right: 10px;
            width: 18px; height: 18px; border-radius: 50%;
            background: var(--ink); color: #fff;
            display: none; align-items: center; justify-content: center;
            font-size: 0.65rem; font-weight: 700;
        }
        .melody-card.active .melody-card-check { display: flex; }

        .melody-preview-btn {
            display: flex; align-items: center; gap: 4px; margin-top: 8px;
            padding: 0.25rem 0.6rem; border-radius: 99px;
            border: 1px solid rgba(36,31,26,.25); background: none; font-size: 0.72rem;
            cursor: pointer; transition: all 0.15s; color: var(--ink-soft);
        }
        .melody-preview-btn:hover { border-color: var(--pink); color: var(--pink); }

        /* Sound toggle row */
        .setting-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0.9rem 1rem;
            background: var(--surface); border: 1.5px solid var(--ink);
            border-radius: 12px; box-shadow: 3px 3px 0 var(--ink);
        }

        .setting-row-label { font-size: 0.9rem; font-weight: 600; color: var(--ink); }
        .setting-row-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

        .toggle-switch {
            width: 46px; height: 26px; border-radius: 99px;
            border: 2px solid var(--ink); background: rgba(36,31,26,.1);
            position: relative; cursor: pointer; transition: background 0.2s;
            flex-shrink: 0;
        }
        .toggle-switch.on { background: var(--mint); }
        .toggle-switch::after {
            content: ''; position: absolute;
            left: 2px; top: 2px;
            width: 18px; height: 18px; border-radius: 50%;
            background: #fff; border: 1.5px solid var(--ink);
            transition: transform 0.2s;
        }
        .toggle-switch.on::after { transform: translateX(20px); }

        .settings-stats {
            padding: 1rem; background: var(--surface);
            border: 1.5px solid var(--ink); border-radius: 12px;
            box-shadow: 3px 3px 0 var(--ink);
            display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;
        }

        .stat-item { text-align: center; }
        .stat-num {
            font-family: 'Caveat', cursive; font-size: 2rem; font-weight: 700;
            color: var(--pink); display: block;
        }
        .stat-label { font-size: 0.72rem; color: var(--muted); }

        /* ── Flash ── */
        #flash {
            position: fixed; inset: 0; pointer-events: none; opacity: 0;
            background: radial-gradient(circle at center, rgba(255,126,176,.25) 0%, transparent 65%);
            transition: opacity 0.3s; z-index: 50;
        }
        #flash.on { opacity: 1; }

        /* ── Toast ── */
        #toast {
            position: fixed; bottom: 2rem; left: 50%;
            transform: translateX(-50%) translateY(80px);
            background: var(--ink); color: #fff;
            padding: 0.65rem 1.4rem; border-radius: 99px;
            font-size: 0.85rem; z-index: 200; white-space: nowrap;
            opacity: 0; transition: transform 0.3s, opacity 0.3s;
            box-shadow: 3px 3px 0 rgba(0,0,0,.2);
            pointer-events: none;
        }
        #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ── Floating note ── */
        .fnote {
            position: fixed; pointer-events: none; z-index: 60;
            font-size: 2rem;
            animation: floatNote 1.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }
        @keyframes floatNote {
            0%   { transform: translate(0,0) scale(0.4) rotate(0deg); opacity: 1; }
            60%  { transform: translate(-20px,-140px) scale(1.3) rotate(-15deg); opacity: 1; }
            100% { transform: translate(10px,-200px) scale(0.8) rotate(10deg); opacity: 0; }
        }

        /* ── Keyboard shortcut hint ── */
        .shortcut-hint {
            font-size: 0.68rem; color: var(--muted); margin-top: 0.4rem; text-align: center;
        }
        .key-badge {
            display: inline-block; padding: 1px 6px;
            border: 1px solid var(--muted); border-radius: 4px;
            font-size: 0.66rem; font-family: monospace; margin: 0 2px;
        }
    </style>
</head>
<body>
    <div id="flash"></div>
    <div id="toast"></div>

    <!-- Session Complete Overlay -->
    <div id="sessionComplete">
        <div class="holo-disk" id="holoDisk">
            <div class="holo-disk-inner">
                <span id="newNoteSymbol">♪</span>

        <div class="complete-hint">디스크를 눌러서 이 음 들어보기</div>
        <div class="complete-track" id="completeTrack"></div>
        <div class="complete-btns">

        </div>
    </div>

    <!-- Nav -->
    <nav class="app-nav">
        <div class="nav-logo">focus <span class="holo-text">melody</span></div>
        <div class="nav-tabs">

    </nav>

    <!-- Timer View -->
    <div class="view active" id="timerView">

        <!-- Melody track -->
        <div class="melody-track-wrap" style="margin-top:1.2rem;">
            <div class="track-header">
                <span class="track-label" id="trackTitle">이번 주 멜로디 트랙</span>
                <span class="track-count" id="trackCount">0 / 14</span>
            </div>
            <div class="track-slots" id="trackSlots"></div>
        </div>

        <!-- Timer -->
        <div class="timer-wrapper" id="timerWrap">
            <svg class="timer-svg" viewBox="0 0 240 240">
                <defs>
                    <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff7eb0"/>
                        <stop offset="50%" stop-color="#c9b3ff"/>
                        <stop offset="100%" stop-color="#7fe3c8"/>
                    </linearGradient>
                </defs>
                <circle class="timer-track" cx="120" cy="120" r="112.5"/>
                <circle class="timer-glow" cx="120" cy="120" r="112.5"/>
                <circle class="timer-progress" id="timerRing" cx="120" cy="120" r="112.5"/>
            </svg>
            <div class="timer-center">
                <div class="timer-display" id="timerDisplay">25:00</div>

        <!-- Duration -->
        <div class="duration-row">

            <button class="dur-btn active" data-min="25">25분</button>
            <button class="dur-btn" data-min="45">45분</button>

        <!-- Controls -->

        <!-- Notes -->
        <div class="notes-section" style="margin-top:1rem;">

            <button class="btn-play-melody" id="playBtn" disabled>♪ 멜로디 듣기</button>

        </div>
    </div>

    <!-- Collection View -->
    <div class="view" id="collectionView">
        <div class="collection-title">내 카세트 보관함</div>
        <div class="collection-sub">완성한 멜로디마다 카세트 하나. 클릭해서 다시 들을 수 있어요.</div>
        <div class="cassette-grid" id="cassetteGrid"></div>
    </div>

    <!-- Settings View -->
    <div class="view" id="settingsView">
        <div class="settings-title">설정</div>

        <!-- Melody selection -->
        <div class="settings-section">
            <span class="settings-section-label">멜로디 선택</span>
            <div class="melody-cards" id="melodyCards"></div>
        </div>

        <!-- Sound toggle -->
        <div class="settings-section">
            <span class="settings-section-label">소리</span>
            <div class="setting-row">
                <div>
                    <div class="setting-row-label">소리 켜기</div>
                    <div class="setting-row-desc">멜로디 재생 및 효과음</div>
                </div>
                <div class="toggle-switch on" id="soundToggle"></div>
            </div>
        </div>

        <!-- Stats -->
        <div class="settings-section">
            <span class="settings-section-label">통계</span>
            <div class="settings-stats">
                <div class="stat-item">
                    <span class="stat-num" id="statTotal">0</span>
                    <span class="stat-label">총 완료 세션</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="statWeeks">0</span>
                    <span class="stat-label">완성한 멜로디</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="statThis">0</span>
                    <span class="stat-label">이번 주 음표</span>
                </div>
                <div class="stat-item">
                    <span class="stat-num" id="statStreak">0</span>
                    <span class="stat-label">완성률 %</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ── Melody Definitions ───────────────────────────────────────
        const MELODIES = [
            {
                id: 'ode',
                name: '기쁨의 송가',
                emoji: '🎵',
                desc: 'Ode to Joy · 14♪',
                total: 14,
                freqs: [329.63, 329.63, 349.23, 392, 392, 349.23, 329.63, 293.66,
                        261.63, 261.63, 293.66, 329.63, 329.63, 293.66],
                noteNames: ['미','미','파','솔','솔','파','미','레','도','도','레','미','미','레'],
            },
            {
                id: 'birthday',
                name: '생일 축하해',
                emoji: '🎂',
                desc: 'Happy Birthday · 12♪',
                total: 12,
                freqs: [261.63, 261.63, 293.66, 261.63, 349.23, 329.63,
                        261.63, 261.63, 293.66, 261.63, 392, 349.23],
                noteNames: ['도','도','레','도','파','미','도','도','레','도','솔','파'],
            },
            {
                id: 'twinkle',
                name: '반짝반짝',
                emoji: '⭐',
                desc: 'Twinkle Twinkle · 14♪',
                total: 14,
                freqs: [261.63, 261.63, 392, 392, 440, 440, 392,
                        349.23, 349.23, 329.63, 329.63, 293.66, 293.66, 261.63],
                noteNames: ['도','도','솔','솔','라','라','솔','파','파','미','미','레','레','도'],
            },
        ];

        // ── Constants ────────────────────────────────────────────────
        const CIRCUMFERENCE = 2 * Math.PI * 112.5;
        const NOTE_STEP = 0.58;
        const NOTE_DUR  = 0.55;
        const NOTE_SYMBOLS = ['♩','♪','♫','♬'];
        const PALETTES = [
            ['#ff7eb0','rgba(255,126,176,.14)'],
            ['#7fe3c8','rgba(127,227,200,.14)'],
            ['#c9b3ff','rgba(201,179,255,.14)'],
            ['#ffc585','rgba(255,197,133,.14)'],
            ['#7fc8ff','rgba(127,200,255,.14)'],
            ['#ff9f7f','rgba(255,159,127,.14)'],
            ['#a8e85a','rgba(168,232,90,.14)'],
        ];

        // ── State ────────────────────────────────────────────────────
        let duration   = 25 * 60;
        let timeLeft   = duration;
        let running    = false;
        let sessionStarted = false;  // true once timer has ticked at least once
        let intervalId = null;
        let loopGen    = 0;
        let loopTimeoutId = null;
        let notes      = [];
        let weekKey    = '';
        let history    = [];
        let audioCtx   = null;
        let soundOn    = true;
        let activeMelodyId = 'ode';
        let totalSessionsEver = 0;

        function getActiveMelody() {
            return MELODIES.find(m => m.id === activeMelodyId) || MELODIES[0];
        }

        // ── DOM ──────────────────────────────────────────────────────
        const timerDisplay  = document.getElementById('timerDisplay');
        const timerStatus   = document.getElementById('timerStatus');
        const timerRing     = document.getElementById('timerRing');
        const startBtn      = document.getElementById('startBtn');
        const resetBtn      = document.getElementById('resetBtn');
        const abandonBtn    = document.getElementById('abandonBtn');
        const stopMelodyBtn = document.getElementById('stopMelodyBtn');
        const playBtn       = document.getElementById('playBtn');
        const notesGrid     = document.getElementById('notesGrid');
        const trackSlots    = document.getElementById('trackSlots');
        const trackCount    = document.getElementById('trackCount');
        const trackTitle    = document.getElementById('trackTitle');
        const banner        = document.getElementById('banner');
        const flash         = document.getElementById('flash');
        const weekLabel     = document.getElementById('weekLabel');
        const timerWrap     = document.getElementById('timerWrap');
        const sessionComplete = document.getElementById('sessionComplete');
        const completeTitle = document.getElementById('completeTitle');
        const completeSub   = document.getElementById('completeSub');
        const completeTrack = document.getElementById('completeTrack');
        const newNoteSymbol = document.getElementById('newNoteSymbol');
        const holoDisk      = document.getElementById('holoDisk');
        const cassetteGrid  = document.getElementById('cassetteGrid');
        const soundToggle   = document.getElementById('soundToggle');
        const toast         = document.getElementById('toast');

        // ── Persistence ──────────────────────────────────────────────
        function getWeekKey() {
            const d = new Date(), day = d.getDay();
            const mon = new Date(d);
            mon.setDate(d.getDate() - ((day + 6) % 7));
            return `${mon.getFullYear()}-W${mon.toISOString().slice(0,10)}`;
        }

        function weekKeyToLabel(wk) {
            const dateStr = wk.replace(/^\d{4}-W/, '');
            const d = new Date(dateStr);
            return `${d.getMonth()+1}월 ${d.getDate()}일 주`;
        }

        function loadState() {
            try {
                const s = JSON.parse(localStorage.getItem('fm_v5') || '{}');
                weekKey = getWeekKey();
                history = s.history || [];
                soundOn = s.settings?.soundOn !== false;
                activeMelodyId = s.settings?.melodyId || 'ode';
                totalSessionsEver = s.totalSessions || 0;

                if (s.currentWeek && s.currentWeek.weekKey === weekKey
                    && s.currentWeek.melodyId === activeMelodyId) {
                    notes = s.currentWeek.notes || [];
                } else {
                    if (s.currentWeek && s.currentWeek.notes?.length > 0) {
                        const old = s.currentWeek;
                        if (!history.find(h => h.weekKey === old.weekKey && h.melodyId === old.melodyId)) {
                            history.push({ weekKey: old.weekKey, notes: old.notes, melodyId: old.melodyId || 'ode' });
                        }
                    }
                    notes = [];
                }
            } catch {
                notes = []; weekKey = getWeekKey(); history = []; totalSessionsEver = 0;
            }
        }

        function saveState() {
            localStorage.setItem('fm_v5', JSON.stringify({
                currentWeek: { weekKey, notes, melodyId: activeMelodyId },
                history,
                settings: { melodyId: activeMelodyId, soundOn },
                totalSessions: totalSessionsEver,
            }));
        }

        // ── Audio ────────────────────────────────────────────────────
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playNote(freq, startAt, dur = NOTE_DUR, vol = 0.22) {
            if (!soundOn) return;
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator(), osc2 = ctx.createOscillator();
            const gain = ctx.createGain(), filter = ctx.createBiquadFilter();
            osc.connect(filter); osc2.connect(filter);
            filter.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc2.type = 'triangle';
            osc.frequency.setValueAtTime(freq, startAt);
            osc2.frequency.setValueAtTime(freq * 2, startAt);
            filter.type = 'lowpass'; filter.frequency.setValueAtTime(2200, startAt);
            gain.gain.setValueAtTime(0, startAt);
            gain.gain.linearRampToValueAtTime(vol, startAt + 0.04);
            gain.gain.setValueAtTime(vol, startAt + dur * 0.6);
            gain.gain.exponentialRampToValueAtTime(0.001, startAt + dur);
            const t = startAt + dur + 0.05;
            osc.start(startAt); osc.stop(t);
            osc2.start(startAt); osc2.stop(t);
        }

        function playMelody(noteArr, onNote) {
            if (!soundOn) return;
            const arr = noteArr || notes;
            if (!arr.length) return;
            const ctx = getAudioCtx();
            const m = getActiveMelody();
            arr.forEach((_, i) => {
                const freq = m.freqs[i % m.freqs.length];
                playNote(freq, ctx.currentTime + i * NOTE_STEP + 0.08);
                if (onNote) setTimeout(() => onNote(i), (i * NOTE_STEP + 0.08) * 1000);
            });
        }

        function playMelodyForCollection(notesArr, melodyId, onNote) {
            if (!soundOn) return;
            const arr = notesArr;
            if (!arr.length) return;
            const m = MELODIES.find(x => x.id === melodyId) || MELODIES[0];
            const ctx = getAudioCtx();
            arr.forEach((_, i) => {
                const freq = m.freqs[i % m.freqs.length];
                playNote(freq, ctx.currentTime + i * NOTE_STEP + 0.08);
                if (onNote) setTimeout(() => onNote(i), (i * NOTE_STEP + 0.08) * 1000);
            });
        }

        // ── Melody loop ──────────────────────────────────────────────
        function melodyDurationMs(arr) {
            const a = arr || notes;
            return ((a.length - 1) * NOTE_STEP + NOTE_DUR + 1.5) * 1000;
        }

        function startMelodyLoop(noteArr, melodyId) {
            const arr = noteArr || notes;
            if (!arr.length || !soundOn) return;
            const mid = melodyId || activeMelodyId;
            const myGen = ++loopGen;

            function playOnce() {
                if (myGen !== loopGen) return;
                if (mid === activeMelodyId && !noteArr) {
                    playMelody(arr, i => highlightChip(i));
                } else {
                    playMelodyForCollection(arr, mid, null);
                }
                loopTimeoutId = setTimeout(playOnce, melodyDurationMs(arr));
            }
            loopTimeoutId = setTimeout(playOnce, 600);
        }

        function stopMelodyLoop() {
            loopGen++;
            clearTimeout(loopTimeoutId);
            loopTimeoutId = null;
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
        }

        // ── Timer ────────────────────────────────────────────────────
        function fmt(s) {
            return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        }

        function setRing(frac) {
            const offset = CIRCUMFERENCE * (1 - Math.max(0, frac));
            timerRing.style.strokeDashoffset = offset;
            const glowEl = document.querySelector('.timer-glow');
            if (glowEl) glowEl.style.strokeDashoffset = offset;
        }

        function tick() {
            if (timeLeft <= 0) {
                clearInterval(intervalId);
                running = false;
                sessionStarted = false;
                startBtn.textContent = '▶';
                startBtn.classList.remove('running');
                timerStatus.textContent = '완료!';
                updateAbandonVisibility();
                onComplete();
                return;
            }
            timeLeft--;
            timerDisplay.textContent = fmt(timeLeft);
            setRing(timeLeft / duration);
        }

        function startPause() {
            if (running) {
                clearInterval(intervalId);
                running = false;
                startBtn.textContent = '▶';
                startBtn.classList.remove('running');
                timerStatus.textContent = '일시정지';
            } else {
                stopMelodyLoop();
                stopMelodyBtn.style.display = 'none';
                if (soundOn) getAudioCtx();
                running = true;
                sessionStarted = true;
                startBtn.textContent = '⏸';
                startBtn.classList.add('running');
                timerStatus.textContent = '집중 중...';
                intervalId = setInterval(tick, 1000);
            }
            updateAbandonVisibility();
        }

        function resetTimer() {
            clearInterval(intervalId);
            stopMelodyLoop();
            stopMelodyBtn.style.display = 'none';
            running = false;
            sessionStarted = false;
            timeLeft = duration;
            timerDisplay.textContent = fmt(timeLeft);
            timerStatus.textContent = '준비';
            startBtn.textContent = '▶';
            startBtn.classList.remove('running');
            setRing(1);
            updateAbandonVisibility();
        }

        function forceEndSession() {
            clearInterval(intervalId);
            stopMelodyLoop();
            stopMelodyBtn.style.display = 'none';
            running = false;
            sessionStarted = false;
            timeLeft = duration;
            timerDisplay.textContent = fmt(timeLeft);
            timerStatus.textContent = '준비';
            startBtn.textContent = '▶';
            startBtn.classList.remove('running');
            setRing(1);
            updateAbandonVisibility();
            showToast('세션을 포기했어요. 음표는 쌓이지 않았어요 🙈');
        }

        function updateAbandonVisibility() {
            abandonBtn.style.display = sessionStarted ? '' : 'none';
        }

        // ── Session Complete ─────────────────────────────────────────
        function onComplete() {
            const m = getActiveMelody();
            if (notes.length < m.total) {
                notes.push(notes.length);
                totalSessionsEver++;
                saveState();
                renderTrackSlots();
                renderNotes();
                spawnFloatingNote();
                flash.classList.add('on');
                setTimeout(() => flash.classList.remove('on'), 700);
            }

            if (notes.length >= m.total) {
                banner.classList.add('show');
                if (!history.find(h => h.weekKey === weekKey && h.melodyId === activeMelodyId)) {
                    history.push({ weekKey, notes: [...notes], melodyId: activeMelodyId });
                    saveState();
                }
            }

            showSessionComplete();
        }

        function showSessionComplete() {
            const m = getActiveMelody();
            const n = notes.length;
            const sym = NOTE_SYMBOLS[(n - 1) % NOTE_SYMBOLS.length];
            const noteName = m.noteNames[(n - 1) % m.noteNames.length];

            newNoteSymbol.textContent = sym;
            completeTitle.textContent = `${n}번째 음 추가됐어요!`;
            completeSub.textContent = `${noteName} · ${m.name} · ${n} / ${m.total}`;

            completeTrack.innerHTML = Array.from({ length: m.total }, (_, i) => {
                const cls = i < n - 1 ? 'filled' : i === n - 1 ? 'new-one' : '';
                return `<div class="complete-slot ${cls}"></div>`;
            }).join('');

            spawnConfetti();
            sessionComplete.classList.add('show');

            if (soundOn) startMelodyLoop();
        }

        function hideSessionComplete(doReset) {
            sessionComplete.classList.remove('show');
            if (doReset) {
                resetTimer();
            } else {
                if (soundOn) stopMelodyBtn.style.display = '';
            }
        }

        // ── Holodisk click: play individual new note ─────────────────
        holoDisk.addEventListener('click', () => {
            const m = getActiveMelody();
            const n = notes.length;
            if (!n || !soundOn) return;
            const freq = m.freqs[(n - 1) % m.freqs.length];
            if (soundOn) getAudioCtx();
            const ctx = getAudioCtx();
            playNote(freq, ctx.currentTime + 0.05, 1.2, 0.3);
        });

        // ── Confetti / floating note ─────────────────────────────────
        function spawnConfetti() {
            const pieces = ['✦','✧','♪','♫','♥','★','🎵','🌸'];
            for (let i = 0; i < 18; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'confetti-piece';
                    el.textContent = pieces[Math.floor(Math.random() * pieces.length)];
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.top = '-20px';
                    el.style.setProperty('--dx', (Math.random() * 120 - 60) + 'px');
                    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                    el.style.animationDelay = (Math.random() * 0.5) + 's';
                    el.style.fontSize = (1 + Math.random()) + 'rem';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 4000);
                }, i * 80);
            }
        }

        function spawnFloatingNote() {
            const r = timerWrap.getBoundingClientRect();
            const el = document.createElement('div');
            el.className = 'fnote';
            el.textContent = NOTE_SYMBOLS[notes.length % NOTE_SYMBOLS.length];
            el.style.left = (r.left + r.width / 2 - 16) + 'px';
            el.style.top  = (r.top  + r.height / 2) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }

        function highlightChip(index) {
            const chip = notesGrid.querySelectorAll('.note-chip')[index];
            if (!chip) return;
            chip.classList.remove('lit');
            void chip.offsetWidth;
            chip.classList.add('lit');
        }

        // ── Toast ────────────────────────────────────────────────────
        let toastTimer = null;
        function showToast(msg, ms = 2800) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), ms);
        }

        // ── Render ───────────────────────────────────────────────────
        function renderTrackSlots() {
            const m = getActiveMelody();
            trackSlots.innerHTML = Array.from({ length: m.total }, (_, i) =>
                `<div class="slot ${i < notes.length ? 'filled' : ''}"></div>`
            ).join('');
            trackCount.textContent = `${notes.length} / ${m.total}`;
            trackTitle.textContent = `${m.name} 트랙`;
        }

        function renderNotes() {
            const m = getActiveMelody();
            playBtn.disabled = notes.length === 0;

            if (notes.length === 0) {
                notesGrid.innerHTML = '<p class="empty-hint">집중 세션을 완료하면 음이 쌓여요 🎵</p>';
                return;
            }
            notesGrid.innerHTML = notes.map((_, i) => {
                const sym = NOTE_SYMBOLS[i % NOTE_SYMBOLS.length];
                const [color, bg] = PALETTES[i % PALETTES.length];
                const name = m.noteNames[i];
                return `<div class="note-chip" title="${name}" style="background:${bg};border-color:${color};color:${color};box-shadow:2px 2px 0 ${color};">${sym}</div>`;
            }).join('');

            if (notes.length >= m.total) banner.classList.add('show');
        }

        function renderCollection() {
            const allWeeks = [];
            history.forEach(hw => {
                if (!(hw.weekKey === weekKey && hw.melodyId === activeMelodyId))
                    allWeeks.push({ ...hw, isCurrent: false });
            });
            if (notes.length > 0) allWeeks.push({ weekKey, notes, melodyId: activeMelodyId, isCurrent: true });
            allWeeks.reverse();

            if (allWeeks.length === 0) {
                cassetteGrid.innerHTML = '<div class="empty-collection">집중 세션을 완료하면<br>카세트가 쌓여요 🎵</div>';
                return;
            }

            const colors = ['#ff7eb0','#7fe3c8','#c9b3ff','#ffc585','#7fc8ff'];
            cassetteGrid.innerHTML = allWeeks.map((wk, idx) => {
                const m = MELODIES.find(x => x.id === wk.melodyId) || MELODIES[0];
                const inProgress = wk.isCurrent && wk.notes.length < m.total;
                const color = colors[idx % colors.length];
                const dots = Array.from({ length: m.total }, (_, i) =>
                    `<div class="cassette-dot ${i < wk.notes.length ? 'filled' : ''}"></div>`
                ).join('');
                const label = inProgress
                    ? `진행 중 · ${wk.notes.length} / ${m.total}`
                    : `완성 · ${wk.notes.length}음`;
                const weekText = wk.isCurrent ? '이번 주' : weekKeyToLabel(wk.weekKey);

                return `<div class="cassette ${inProgress ? 'in-progress' : ''}" data-idx="${idx}" data-melody="${wk.melodyId}">
                    <div class="cassette-window" style="background:rgba(${hexToRgb(color)},.08)">
                        <div class="reel" style="border-color:${color};"></div>
                        <div class="cassette-tape-line"></div>
                        <div class="reel" style="border-color:${color};"></div>
                    </div>
                    <div class="cassette-dots">${dots}</div>
                    <div class="cassette-label">${weekText}</div>
                    <div class="cassette-melody-name">${m.emoji} ${m.name}</div>
                    <div class="cassette-week">${label}</div>
                    ${!inProgress ? `<button class="cassette-play-btn" data-idx="${idx}">▶ 듣기</button>` : ''}
                </div>`;
            }).join('');

            // Bind play buttons in collection
            cassetteGrid.querySelectorAll('.cassette-play-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    const wk = allWeeks[idx];
                    if (!wk) return;
                    stopMelodyLoop();
                    if (soundOn) getAudioCtx();
                    startMelodyLoop(wk.notes, wk.melodyId);
                    document.querySelectorAll('.cassette').forEach(c => c.classList.remove('playing'));
                    btn.closest('.cassette').classList.add('playing');
                    const origText = btn.textContent;
                    btn.textContent = '■ 멈추기';
                    const stop = (ev) => {
                        if (ev) ev.stopPropagation();
                        stopMelodyLoop();
                        btn.closest('.cassette').classList.remove('playing');
                        btn.textContent = origText;
                        btn.removeEventListener('click', stop);
                        btn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            if (soundOn) getAudioCtx();
                            startMelodyLoop(wk.notes, wk.melodyId);
                            btn.closest('.cassette').classList.add('playing');
                            btn.textContent = '■ 멈추기';
                        }, { once: true });
                    };
                    btn.addEventListener('click', stop, { once: true });
                });
            });
        }

        function renderMelodyCards() {
            const cardsEl = document.getElementById('melodyCards');
            cardsEl.innerHTML = MELODIES.map(m => `
                <div class="melody-card ${m.id === activeMelodyId ? 'active' : ''}" data-melody="${m.id}">
                    <div class="melody-card-check">✓</div>
                    <span class="melody-card-emoji">${m.emoji}</span>
                    <span class="melody-card-name">${m.name}</span>
                    <span class="melody-card-desc">${m.desc}</span>
                    <button class="melody-preview-btn" data-preview="${m.id}">▶ 미리듣기</button>
                </div>
            `).join('');

            cardsEl.querySelectorAll('.melody-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('melody-preview-btn')) return;
                    const mid = card.dataset.melody;
                    if (mid === activeMelodyId) return;

                    if (notes.length > 0) {
                        const ok = confirm(`멜로디를 바꾸면 이번 주 진행 중인 내용(${notes.length}음)이 보관함에 저장되고 새로 시작해요. 계속할까요?`);
                        if (!ok) return;
                        // Archive current progress
                        if (!history.find(h => h.weekKey === weekKey && h.melodyId === activeMelodyId)) {
                            history.push({ weekKey, notes: [...notes], melodyId: activeMelodyId });
                        }
                    }

                    activeMelodyId = mid;
                    notes = [];
                    banner.classList.remove('show');
                    saveState();
                    renderTrackSlots();
                    renderNotes();
                    renderMelodyCards();
                    updateWeekLabel();
                    showToast(`${getActiveMelody().name}으로 바꿨어요 ${getActiveMelody().emoji}`);
                });
            });

            cardsEl.querySelectorAll('.melody-preview-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const mid = btn.dataset.preview;
                    const m = MELODIES.find(x => x.id === mid);
                    if (!m || !soundOn) {
                        if (!soundOn) showToast('소리가 꺼져 있어요 🔇');
                        return;
                    }
                    stopMelodyLoop();
                    if (soundOn) getAudioCtx();
                    // Play a short preview (first 4 notes)
                    const ctx = getAudioCtx();
                    const preview = m.freqs.slice(0, 5);
                    preview.forEach((freq, i) => {
                        playNote(freq, ctx.currentTime + i * NOTE_STEP + 0.05, NOTE_DUR, 0.2);
                    });
                });
            });
        }

        function renderStats() {
            const m = getActiveMelody();
            const completedWeeks = history.filter(h => {
                const hm = MELODIES.find(x => x.id === h.melodyId) || MELODIES[0];
                return h.notes.length >= hm.total;
            }).length;
            const completion = m.total > 0 ? Math.round((notes.length / m.total) * 100) : 0;

            document.getElementById('statTotal').textContent = totalSessionsEver;
            document.getElementById('statWeeks').textContent = completedWeeks;
            document.getElementById('statThis').textContent = notes.length;
            document.getElementById('statStreak').textContent = completion;
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3),16);
            const g = parseInt(hex.slice(3,5),16);
            const b = parseInt(hex.slice(5,7),16);
            return `${r},${g},${b}`;
        }

        function updateWeekLabel() {
            const days = ['일','월','화','수','목','금','토'];
            const m = getActiveMelody();
            weekLabel.textContent = `${days[new Date().getDay()]}요일 · ${notes.length}/${m.total}`;
        }

        // ── View switching ───────────────────────────────────────────
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                tab.classList.add('active');
                const view = document.getElementById(tab.dataset.view);
                view.classList.add('active');
                if (tab.dataset.view === 'collectionView') renderCollection();
                if (tab.dataset.view === 'settingsView') { renderMelodyCards(); renderStats(); }
            });
        });

        // ── Events ───────────────────────────────────────────────────
        startBtn.addEventListener('click', startPause);
        resetBtn.addEventListener('click', resetTimer);
        abandonBtn.addEventListener('click', forceEndSession);

        stopMelodyBtn.addEventListener('click', () => {
            stopMelodyLoop();
            stopMelodyBtn.style.display = 'none';
        });

        playBtn.addEventListener('click', () => {
            if (!soundOn) { showToast('소리가 꺼져 있어요 🔇'); return; }
            getAudioCtx();
            playMelody(null, i => highlightChip(i));
        });

        document.querySelectorAll('.dur-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (running) return;
                document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                duration = parseInt(btn.dataset.min) * 60;
                timeLeft  = duration;
                timerDisplay.textContent = fmt(timeLeft);
                setRing(1);
            });
        });

        document.getElementById('nextSessionBtn').addEventListener('click', () => {
            hideSessionComplete(true);
        });

        document.getElementById('closeCompleteBtn').addEventListener('click', () => {
            hideSessionComplete(false);
        });

        soundToggle.addEventListener('click', () => {
            soundOn = !soundOn;
            soundToggle.classList.toggle('on', soundOn);
            if (!soundOn) {
                stopMelodyLoop();
                stopMelodyBtn.style.display = 'none';
            }
            saveState();
            showToast(soundOn ? '소리 켜짐 🔊' : '소리 꺼짐 🔇');
        });

        // Space key: start/pause
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'INPUT') {
                e.preventDefault();
                // Only if on timer view
                const timerView = document.getElementById('timerView');
                if (timerView.classList.contains('active')) {
                    startPause();
                }
            }
        });

        // ── Init ─────────────────────────────────────────────────────
        loadState();
        soundToggle.classList.toggle('on', soundOn);
        renderTrackSlots();
        renderNotes();
        updateWeekLabel();
        updateAbandonVisibility();
        timerDisplay.textContent = fmt(timeLeft);
        setRing(1);
        setInterval(updateWeekLabel, 60_000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Melody</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f5f3ff;
            --surface: #ffffff;
            --accent: #7c3aed;
            --accent2: #db2777;
            --text: #1e1040;
            --muted: #9585c0;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            padding: 1.2rem 1.5rem;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 65% 55% at 5% 0%,   rgba(167,139,250,0.3) 0%, transparent 55%),
                radial-gradient(ellipse 55% 50% at 95% 100%, rgba(251,113,133,0.22) 0%, transparent 55%),
                radial-gradient(ellipse 45% 40% at 50% 55%,  rgba(196,181,253,0.12) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        body > * { position: relative; z-index: 1; }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 0.9rem;
        }

        .logo {
            font-size: 0.7rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        .week-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.3rem 0.9rem;
            background: white;
            border-radius: 2rem;
            font-size: 0.8rem;
            color: var(--muted);
            border: 1px solid rgba(124,58,237,0.12);
            box-shadow: 0 2px 8px rgba(124,58,237,0.08);
        }

        .week-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
        }

        /* Timer wrapper */
        .timer-wrapper {
            position: relative;
            width: 200px;
            height: 200px;
            margin-bottom: 0.8rem;
        }

        .timer-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-track {
            fill: none;
            stroke: rgba(124,58,237,0.1);
            stroke-width: 10;
        }

        .timer-progress {
            fill: none;
            stroke: url(#grad);
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 706.86;
            stroke-dashoffset: 0;
        }

        .timer-glow {
            fill: none;
            stroke: url(#gradGlow);
            stroke-width: 20;
            stroke-linecap: round;
            stroke-dasharray: 706.86;
            stroke-dashoffset: 0;
            opacity: 0.15;
            filter: blur(6px);
        }

        .timer-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
        }

        .timer-display {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: -3px;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            color: var(--text);
        }

        .timer-status {
            font-size: 0.7rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
        }

        /* Duration selector */
        .duration-row {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.8rem;
        }

        .dur-btn {
            padding: 0.35rem 0.9rem;
            border-radius: 2rem;
            border: 1px solid rgba(124,58,237,0.15);
            background: white;
            color: var(--muted);
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 4px rgba(124,58,237,0.06);
        }

        .dur-btn:hover { color: var(--accent); border-color: rgba(124,58,237,0.3); }
        .dur-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(124,58,237,0.08);
            font-weight: 600;
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            margin-bottom: 1.2rem;
        }

        .btn-start {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(124,58,237,0.35);
            transition: transform 0.15s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-start:hover {
            transform: scale(1.06);
            box-shadow: 0 6px 28px rgba(124,58,237,0.45);
        }

        .btn-start:active { transform: scale(0.94); }

        .btn-start.running {
            animation: pulseRing 2s ease-in-out infinite;
        }

        @keyframes pulseRing {
            0%, 100% { box-shadow: 0 4px 20px rgba(124,58,237,0.35); }
            50%       { box-shadow: 0 4px 32px rgba(124,58,237,0.55), 0 0 0 10px rgba(124,58,237,0.06); }
        }

        .btn-ghost {
            padding: 0.45rem 1.1rem;
            border-radius: 2rem;
            border: 1px solid rgba(124,58,237,0.15);
            background: white;
            color: var(--muted);
            font-size: 0.82rem;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 1px 4px rgba(124,58,237,0.06);
        }

        .btn-ghost:hover { color: var(--accent); border-color: rgba(124,58,237,0.3); }

        /* Melody section */
        .melody-section {
            width: 100%;
            max-width: 560px;
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .section-label {
            font-size: 0.75rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
        }

        .section-count {
            font-size: 0.8rem;
            color: var(--accent);
            font-weight: 600;
        }

        /* Progress bar */
        .progress-bar-wrap {
            height: 3px;
            background: rgba(124,58,237,0.08);
            border-radius: 2px;
            margin-bottom: 0.8rem;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            border-radius: 2px;
            transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Notes grid */
        .notes-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1rem 1.2rem;
            background: white;
            border-radius: 1.2rem;
            min-height: 80px;
            border: 1px solid rgba(124,58,237,0.1);
            box-shadow: 0 4px 24px rgba(124,58,237,0.07);
            align-items: center;
            flex: 1;
        }

        .empty-hint {
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: var(--muted);
        }

        .note-chip {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            transition: transform 0.2s;
            cursor: default;
        }

        .note-chip:hover { transform: scale(1.15) rotate(5deg); }

        .note-chip.lit {
            animation: noteLit 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes popIn {
            from { transform: scale(0) rotate(-30deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg);   opacity: 1; }
        }

        @keyframes noteLit {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.45); filter: brightness(1.2) saturate(1.5); }
            100% { transform: scale(1); filter: none; }
        }

        /* Play button */
        .btn-play-melody {
            margin-top: 0.6rem;
            width: 100%;
            padding: 0.6rem;
            border-radius: 0.75rem;
            border: 1.5px dashed rgba(124,58,237,0.25);
            background: none;
            color: var(--muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-play-melody:hover {
            border-color: var(--accent);
            color: var(--accent);
            background: rgba(124,58,237,0.04);
        }

        .btn-play-melody:disabled {
            opacity: 0.4;
            cursor: default;
            pointer-events: none;
        }

        /* Completion banner */
        .banner {
            display: none;
            margin-top: 0.6rem;
            padding: 0.9rem 1.25rem;
            text-align: center;
            background: linear-gradient(135deg, rgba(124,58,237,0.07), rgba(219,39,119,0.06));
            border: 1px solid rgba(124,58,237,0.2);
            border-radius: 1rem;
            animation: fadeSlideUp 0.6s cubic-bezier(0.34,1.56,0.64,1);
        }
        .banner.show { display: block; }
        .banner-emoji { font-size: 1.8rem; margin-bottom: 0.4rem; }
        .banner-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.2rem; color: var(--accent); }
        .banner-sub   { font-size: 0.8rem; color: var(--muted); }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Flash overlay */
        #flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            background: radial-gradient(circle at center, rgba(124,58,237,0.15) 0%, transparent 65%);
            transition: opacity 0.3s;
            z-index: 50;
        }
        #flash.on { opacity: 1; }

        /* Floating note */
        .fnote {
            position: fixed;
            pointer-events: none;
            z-index: 100;
            font-size: 2rem;
            animation: floatNote 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes floatNote {
            0%   { transform: translate(0, 0) scale(0.4) rotate(0deg);    opacity: 1; }
            60%  { transform: translate(-20px, -140px) scale(1.3) rotate(-15deg); opacity: 1; }
            100% { transform: translate(10px, -200px) scale(0.8) rotate(10deg);   opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="flash"></div>

    <header class="header">
        <div class="logo">Focus Melody</div>
        <div class="week-badge">
            <span class="week-dot"></span>
            <span id="weekLabel">이번 주 멜로디</span>
        </div>
    </header>

    <div class="timer-wrapper" id="timerWrap">
        <svg class="timer-svg" viewBox="0 0 240 240">
            <defs>
                <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#7c3aed"/>
                    <stop offset="100%" stop-color="#db2777"/>
                </linearGradient>
                <linearGradient id="gradGlow" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#7c3aed"/>
                    <stop offset="100%" stop-color="#db2777"/>
                </linearGradient>
            </defs>
            <circle class="timer-track" cx="120" cy="120" r="112.5"/>
            <circle class="timer-glow" id="timerGlow" cx="120" cy="120" r="112.5"/>
            <circle class="timer-progress" id="timerRing" cx="120" cy="120" r="112.5"/>
        </svg>
        <div class="timer-center">
            <div class="timer-display" id="timerDisplay">25:00</div>
            <div class="timer-status" id="timerStatus">준비</div>
        </div>
    </div>

    <div class="duration-row">
        <button class="dur-btn" data-min="15">15분</button>
        <button class="dur-btn active" data-min="25">25분</button>
        <button class="dur-btn" data-min="45">45분</button>
        <button class="dur-btn" data-min="60">60분</button>
    </div>

    <div class="controls">
        <button class="btn-ghost" id="resetBtn">리셋</button>
        <button class="btn-start" id="startBtn">▶</button>
        <button class="btn-ghost" id="skipBtn">건너뛰기</button>
    </div>

    <section class="melody-section">
        <div class="section-header">
            <span class="section-label">이번 주 멜로디</span>
            <span class="section-count" id="noteCount">0 / 14</span>
        </div>

        <div class="progress-bar-wrap">
            <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
        </div>

        <div class="notes-grid" id="notesGrid">
            <p class="empty-hint">집중 세션을 완료하면 음이 쌓여요 🎵</p>
        </div>

        <button class="btn-play-melody" id="playBtn" disabled>♪ 지금까지 멜로디 듣기</button>

        <div class="banner" id="banner">
            <div class="banner-emoji">🎶</div>
            <div class="banner-title">이번 주 멜로디 완성!</div>
            <div class="banner-sub">14번의 집중으로 노래 하나를 완성했어요. 다음 주에 또 새로운 멜로디가 시작됩니다.</div>
        </div>
    </section>

    <script>
        const CIRCUMFERENCE = 2 * Math.PI * 112.5;

        const MELODY_FREQS = [
            329.63, 329.63, 349.23, 392.00,
            392.00, 349.23, 329.63, 293.66,
            261.63, 261.63, 293.66, 329.63,
            329.63, 293.66,
        ];

        const NOTE_SYMBOLS = ['♩', '♪', '♫', '♬'];

        const PALETTES = [
            ['#7c3aed', 'rgba(124,58,237,0.1)'],
            ['#db2777', 'rgba(219,39,119,0.1)'],
            ['#059669', 'rgba(5,150,105,0.1)'],
            ['#d97706', 'rgba(217,119,6,0.1)'],
            ['#2563eb', 'rgba(37,99,235,0.1)'],
            ['#dc2626', 'rgba(220,38,38,0.1)'],
            ['#65a30d', 'rgba(101,163,13,0.1)'],
        ];

        let duration   = 25 * 60;
        let timeLeft   = duration;
        let running    = false;
        let intervalId = null;
        let looping    = false;
        let loopTimeoutId     = null;
        let loopStartTimeoutId = null;
        let notes   = [];
        let weekKey = '';
        let audioCtx = null;

        const timerDisplay = document.getElementById('timerDisplay');
        const timerStatus  = document.getElementById('timerStatus');
        const timerRing    = document.getElementById('timerRing');
        const timerGlow    = document.getElementById('timerGlow');
        const startBtn     = document.getElementById('startBtn');
        const resetBtn     = document.getElementById('resetBtn');
        const skipBtn      = document.getElementById('skipBtn');
        const playBtn      = document.getElementById('playBtn');
        const notesGrid    = document.getElementById('notesGrid');
        const noteCount    = document.getElementById('noteCount');
        const progressFill = document.getElementById('progressFill');
        const banner       = document.getElementById('banner');
        const flash        = document.getElementById('flash');
        const weekLabel    = document.getElementById('weekLabel');
        const timerWrap    = document.getElementById('timerWrap');

        // ── Persistence ────────────────────────────────────────────
        function getWeekKey() {
            const d = new Date(), day = d.getDay();
            const mon = new Date(d);
            mon.setDate(d.getDate() - ((day + 6) % 7));
            return `${mon.getFullYear()}-W${mon.toISOString().slice(0, 10)}`;
        }

        function loadState() {
            try {
                const s = JSON.parse(localStorage.getItem('fm_v2') || '{}');
                weekKey = getWeekKey();
                notes = s.weekKey === weekKey ? (s.notes || []) : [];
            } catch { notes = []; weekKey = getWeekKey(); }
        }

        function saveState() {
            localStorage.setItem('fm_v2', JSON.stringify({ weekKey, notes }));
        }

        // ── Audio ──────────────────────────────────────────────────
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playNote(freq, startAt, dur = 0.55, vol = 0.22) {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator(), osc2 = ctx.createOscillator();
            const gain = ctx.createGain(), filter = ctx.createBiquadFilter();
            osc.connect(filter); osc2.connect(filter);
            filter.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc2.type = 'triangle';
            osc.frequency.setValueAtTime(freq, startAt);
            osc2.frequency.setValueAtTime(freq * 2, startAt);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(2200, startAt);
            gain.gain.setValueAtTime(0, startAt);
            gain.gain.linearRampToValueAtTime(vol, startAt + 0.04);
            gain.gain.setValueAtTime(vol, startAt + dur * 0.6);
            gain.gain.exponentialRampToValueAtTime(0.001, startAt + dur);
            const t = startAt + dur + 0.05;
            osc.start(startAt); osc.stop(t);
            osc2.start(startAt); osc2.stop(t);
        }

        const NOTE_STEP = 0.58;
        const NOTE_DUR  = 0.55;

        function playMelody(onNote) {
            if (!notes.length) return;
            const ctx = getAudioCtx();
            notes.forEach((_, i) => {
                const freq = MELODY_FREQS[i % MELODY_FREQS.length];
                playNote(freq, ctx.currentTime + i * NOTE_STEP + 0.08);
                if (onNote) setTimeout(() => onNote(i), (i * NOTE_STEP + 0.08) * 1000);
            });
        }

        // ── Melody loop — recursive setTimeout so timing never drifts ──
        function melodyDurationMs() {
            return ((notes.length - 1) * NOTE_STEP + NOTE_DUR + 1.2) * 1000;
        }

        function startMelodyLoop() {
            if (!notes.length) return;
            looping = true;
            function playOnce() {
                if (!looping) return;
                playMelody(i => highlightChip(i));
                loopTimeoutId = setTimeout(playOnce, melodyDurationMs());
            }
            playOnce();
        }

        function stopMelodyLoop() {
            looping = false;
            clearTimeout(loopTimeoutId);
            clearTimeout(loopStartTimeoutId);
            loopTimeoutId = null;
            loopStartTimeoutId = null;
            // 이미 재생 중인 Web Audio 노드도 즉시 끊기
            if (audioCtx) {
                audioCtx.close();
                audioCtx = null;
            }
        }

        // ── Timer ──────────────────────────────────────────────────
        function fmt(s) {
            return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        }

        function setRing(frac) {
            const offset = CIRCUMFERENCE * (1 - Math.max(0, frac));
            timerRing.style.strokeDashoffset = offset;
            timerGlow.style.strokeDashoffset = offset;
        }

        function tick() {
            if (timeLeft <= 0) {
                clearInterval(intervalId);
                running = false;
                startBtn.textContent = '▶';
                startBtn.classList.remove('running');
                timerStatus.textContent = '완료!';
                onComplete();
                return;
            }
            timeLeft--;
            timerDisplay.textContent = fmt(timeLeft);
            setRing(timeLeft / duration);
        }

        function startPause() {
            if (running) {
                clearInterval(intervalId);
                running = false;
                startBtn.textContent = '▶';
                startBtn.classList.remove('running');
                timerStatus.textContent = '일시정지';
            } else {
                stopMelodyLoop();
                getAudioCtx();
                running = true;
                startBtn.textContent = '⏸';
                startBtn.classList.add('running');
                timerStatus.textContent = '집중 중';
                intervalId = setInterval(tick, 1000);
            }
        }

        function resetTimer() {
            clearInterval(intervalId);
            stopMelodyLoop();
            running = false;
            timeLeft = duration;
            timerDisplay.textContent = fmt(timeLeft);
            timerStatus.textContent = '준비';
            startBtn.textContent = '▶';
            startBtn.classList.remove('running');
            setRing(1);
        }

        // ── Completion ─────────────────────────────────────────────
        function onComplete() {
            if (notes.length < MELODY_FREQS.length) {
                notes.push(notes.length);
                saveState();
                renderNotes();
                flash.classList.add('on');
                setTimeout(() => flash.classList.remove('on'), 700);
                spawnFloatingNote();
            }
            if (notes.length >= MELODY_FREQS.length) banner.classList.add('show');
            loopStartTimeoutId = setTimeout(() => startMelodyLoop(), 900);
        }

        function spawnFloatingNote() {
            const r = timerWrap.getBoundingClientRect();
            const el = document.createElement('div');
            el.className = 'fnote';
            el.textContent = NOTE_SYMBOLS[notes.length % NOTE_SYMBOLS.length];
            el.style.left = (r.left + r.width / 2 - 16) + 'px';
            el.style.top  = (r.top  + r.height / 2) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }

        function highlightChip(index) {
            const chip = notesGrid.querySelectorAll('.note-chip')[index];
            if (!chip) return;
            chip.classList.remove('lit');
            void chip.offsetWidth;
            chip.classList.add('lit');
        }

        // ── Render ─────────────────────────────────────────────────
        function renderNotes() {
            const n = notes.length, total = MELODY_FREQS.length;
            noteCount.textContent = `${n} / ${total}`;
            progressFill.style.width = `${(n / total) * 100}%`;
            playBtn.disabled = n === 0;

            if (n === 0) {
                notesGrid.innerHTML = '<p class="empty-hint">집중 세션을 완료하면 음이 쌓여요 🎵</p>';
                return;
            }
            notesGrid.innerHTML = notes.map((_, i) => {
                const sym = NOTE_SYMBOLS[i % NOTE_SYMBOLS.length];
                const [color, bg] = PALETTES[i % PALETTES.length];
                return `<div class="note-chip" style="background:${bg};border:1.5px solid ${color}30;color:${color};" data-i="${i}">${sym}</div>`;
            }).join('');
            if (n >= total) banner.classList.add('show');
        }

        function updateWeekLabel() {
            const days = ['일','월','화','수','목','금','토'];
            weekLabel.textContent = `${days[new Date().getDay()]}요일 · ${notes.length}개 모음`;
        }

        // ── Events ─────────────────────────────────────────────────
        startBtn.addEventListener('click', startPause);
        resetBtn.addEventListener('click', resetTimer);

        skipBtn.addEventListener('click', () => {
            clearInterval(intervalId);
            running = false;
            timeLeft = 0;
            timerDisplay.textContent = fmt(0);
            setRing(0);
            startBtn.textContent = '▶';
            startBtn.classList.remove('running');
            timerStatus.textContent = '완료!';
            onComplete();
        });

        playBtn.addEventListener('click', () => {
            getAudioCtx();
            playMelody(i => highlightChip(i));
        });

        document.querySelectorAll('.dur-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (running) return;
                document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                duration  = parseInt(btn.dataset.min) * 60;
                timeLeft  = duration;
                timerDisplay.textContent = fmt(timeLeft);
                setRing(1);
            });
        });

        // ── Init ───────────────────────────────────────────────────
        loadState();
        renderNotes();
        updateWeekLabel();
        timerDisplay.textContent = fmt(timeLeft);
        setRing(1);
        setInterval(updateWeekLabel, 60_000);
    </script>
</body>
</html>

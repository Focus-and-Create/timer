<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Melody</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #faf5e8;
            --surface: #fff;
            --ink: #241f1a;
            --ink-soft: #5a4f44;
            --muted: #9a8d80;
            --pink: #ff7eb0;
            --mint: #7fe3c8;
            --lav: #c9b3ff;
            --peach: #ffc585;
            --holo: linear-gradient(120deg, #ffd1f0 0%, #c9e8ff 25%, #d6ffd9 45%, #fff4c2 65%, #ffc6ec 85%, #a8d4ff 100%);
            --holo-strong: linear-gradient(120deg, #ff7eb0 0%, #7fc8ff 22%, #7fe3c8 44%, #fff08a 66%, #c9b3ff 88%, #ff7eb0 100%);
        }

        body {
            background: var(--bg);
            color: var(--ink);
            font-family: -apple-system, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: .22;
            background-image: radial-gradient(rgba(36,31,26,.2) 1px, transparent 1px);
            background-size: 22px 22px;
            mix-blend-mode: multiply;
            z-index: 0;
        }

        /* ── Nav ────────────────────────────────────── */
        .app-nav {
            position: relative;
            z-index: 2;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.8rem 1.5rem;
            border-bottom: 1.5px solid var(--ink);
            background: var(--bg);
        }

        .nav-logo {
            font-family: 'Caveat', cursive;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .nav-logo .holo-text {
            background: var(--holo-strong);
            background-size: 300% 100%;
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: holoShift 6s linear infinite;
        }

        @keyframes holoShift {
            from { background-position: 0 0; }
            to   { background-position: 300% 0; }
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
        }

        .nav-tab {
            padding: 0.4rem 1.1rem;
            border: 1.5px solid var(--ink);
            border-radius: 99px;
            background: none;
            color: var(--ink-soft);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            letter-spacing: 0.02em;
        }

        .nav-tab:hover { background: rgba(36,31,26,.06); }

        .nav-tab.active {
            background: var(--ink);
            color: var(--bg);
        }

        .week-badge {
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .week-dot {
            width: 6px; height: 6px;
            border-radius: 50%;
            background: var(--pink);
            box-shadow: 0 0 6px var(--pink);
        }

        /* ── Views ──────────────────────────────────── */
        .view { display: none; position: relative; z-index: 1; }
        .view.active { display: flex; flex-direction: column; align-items: center; }

        /* ── Timer View ─────────────────────────────── */
        #timerView {
            padding: 1.4rem 1.5rem 2rem;
            min-height: calc(100vh - 57px);
        }

        /* Melody track */
        .melody-track-wrap {
            width: 100%;
            max-width: 520px;
            margin-bottom: 1.2rem;
        }

        .track-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 0.5rem;
        }

        .track-label {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 600;
        }

        .track-count {
            font-family: 'Caveat', cursive;
            font-size: 1rem;
            color: var(--ink-soft);
        }

        .track-slots {
            display: flex;
            gap: 5px;
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: 12px;
            padding: 10px 12px;
            box-shadow: 3px 3px 0 var(--ink);
        }

        .slot {
            flex: 1;
            height: 20px;
            border-radius: 6px;
            border: 1.5px solid rgba(36,31,26,.15);
            background: rgba(36,31,26,.04);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .slot.filled {
            border-color: transparent;
            background: var(--holo);
            background-size: 300% 100%;
            animation: holoShift 4s linear infinite;
        }

        .slot.filled.new {
            animation: holoShift 4s linear infinite, slotPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }

        @keyframes slotPop {
            from { transform: scaleY(0); opacity: 0; }
            to   { transform: scaleY(1); opacity: 1; }
        }

        /* Timer */
        .timer-wrapper {
            position: relative;
            width: 210px;
            height: 210px;
            margin-bottom: 0.9rem;
        }

        .timer-svg {
            width: 100%;
            height: 100%;
            transform: rotate(-90deg);
        }

        .timer-track {
            fill: none;
            stroke: rgba(36,31,26,.1);
            stroke-width: 10;
        }

        .timer-progress {
            fill: none;
            stroke: url(#timerGrad);
            stroke-width: 10;
            stroke-linecap: round;
            stroke-dasharray: 706.86;
            stroke-dashoffset: 0;
        }

        .timer-glow {
            fill: none;
            stroke: url(#timerGrad);
            stroke-width: 20;
            stroke-linecap: round;
            stroke-dasharray: 706.86;
            stroke-dashoffset: 0;
            opacity: 0.12;
            filter: blur(5px);
        }

        .timer-center {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .timer-display {
            font-size: 2.8rem;
            font-weight: 700;
            letter-spacing: -3px;
            font-variant-numeric: tabular-nums;
            color: var(--ink);
            line-height: 1;
        }

        .timer-status {
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--muted);
            margin-top: 4px;
        }

        /* Duration */
        .duration-row {
            display: flex;
            gap: 6px;
            margin-bottom: 0.9rem;
        }

        .dur-btn {
            padding: 0.3rem 0.85rem;
            border-radius: 99px;
            border: 1.5px solid var(--ink);
            background: var(--surface);
            color: var(--ink-soft);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 2px 2px 0 var(--ink);
        }

        .dur-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
        .dur-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--ink); }

        .dur-btn.active {
            background: var(--pink);
            color: #fff;
            border-color: var(--ink);
        }

        /* Controls */
        .controls {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.2rem;
        }

        .btn-start {
            width: 66px;
            height: 66px;
            border-radius: 50%;
            border: 2px solid var(--ink);
            background: var(--pink);
            color: #fff;
            font-size: 1.4rem;
            cursor: pointer;
            box-shadow: 4px 4px 0 var(--ink);
            transition: all 0.12s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-start:hover  { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
        .btn-start:active { transform: translate(2px, 2px);  box-shadow: 2px 2px 0 var(--ink); }

        .btn-start.running { background: var(--mint); }

        .btn-outline {
            padding: 0.45rem 1.1rem;
            border-radius: 99px;
            border: 1.5px solid var(--ink);
            background: var(--surface);
            color: var(--ink-soft);
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 2px 2px 0 var(--ink);
            transition: all 0.12s;
        }

        .btn-outline:hover  { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
        .btn-outline:active { transform: translate(1px, 1px);  box-shadow: 1px 1px 0 var(--ink); }

        .btn-outline.stop { background: #fff3f7; border-color: var(--pink); color: var(--pink); display: none; }

        /* Notes grid */
        .notes-section {
            width: 100%;
            max-width: 520px;
        }

        .notes-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .notes-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            padding: 1rem;
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: 16px;
            min-height: 72px;
            align-items: center;
            box-shadow: 3px 3px 0 var(--ink);
        }

        .empty-hint {
            width: 100%;
            text-align: center;
            font-family: 'Caveat', cursive;
            font-size: 1rem;
            color: var(--muted);
        }

        .note-chip {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 1.5px solid var(--ink);
            animation: chipIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
            cursor: default;
            transition: transform 0.15s;
            box-shadow: 2px 2px 0 var(--ink);
        }

        .note-chip:hover { transform: scale(1.18) rotate(5deg); }

        .note-chip.lit {
            animation: chipLit 0.4s cubic-bezier(0.34,1.56,0.64,1);
        }

        @keyframes chipIn {
            from { transform: scale(0) rotate(-30deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg);   opacity: 1; }
        }

        @keyframes chipLit {
            0%   { transform: scale(1); filter: brightness(1); }
            45%  { transform: scale(1.5); filter: brightness(1.3) saturate(1.5); }
            100% { transform: scale(1); filter: none; }
        }

        .btn-play-melody {
            margin-top: 0.6rem;
            width: 100%;
            padding: 0.6rem;
            border-radius: 10px;
            border: 1.5px dashed rgba(36,31,26,.25);
            background: none;
            color: var(--muted);
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-play-melody:hover {
            border-color: var(--pink);
            color: var(--pink);
            background: rgba(255,126,176,.05);
        }

        .btn-play-melody:disabled { opacity: 0.35; pointer-events: none; }

        .banner {
            display: none;
            margin-top: 0.7rem;
            padding: 0.9rem 1rem;
            text-align: center;
            background: var(--holo);
            background-size: 300%;
            animation: holoShift 6s linear infinite;
            border: 1.5px solid var(--ink);
            border-radius: 12px;
            box-shadow: 3px 3px 0 var(--ink);
            font-family: 'Caveat', cursive;
            font-size: 1.1rem;
            font-weight: 700;
        }
        .banner.show { display: block; }

        /* ── Session Complete Overlay ────────────────── */
        #sessionComplete {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(20,15,10,.92);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s;
        }

        #sessionComplete.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* confetti */
        .confetti-piece {
            position: absolute;
            pointer-events: none;
            font-size: 1.4rem;
            animation: confettiFall linear forwards;
        }

        @keyframes confettiFall {
            0%   { transform: translate(0, -20px) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), 100vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        /* holo disk */
        .holo-disk {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: var(--holo-strong);
            background-size: 300% 100%;
            animation: holoShift 3s linear infinite;
            border: 3px solid var(--ink);
            box-shadow: 0 0 40px rgba(255,126,176,.4), 6px 6px 0 var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            animation: holoShift 3s linear infinite, diskIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
        }

        @keyframes diskIn {
            from { transform: scale(0) rotate(-180deg); opacity: 0; }
            to   { transform: scale(1) rotate(0deg);   opacity: 1; }
        }

        .holo-disk-inner {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: #fff;
            border: 2px solid var(--ink);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }

        .complete-title {
            font-family: 'Caveat', cursive;
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            text-align: center;
            margin-bottom: 0.3rem;
        }

        .complete-sub {
            font-size: 0.85rem;
            color: rgba(255,255,255,.55);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        /* mini melody track on complete screen */
        .complete-track {
            display: flex;
            gap: 4px;
            margin-bottom: 2rem;
            padding: 8px 12px;
            background: rgba(255,255,255,.08);
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,.12);
        }

        .complete-slot {
            width: 18px;
            height: 18px;
            border-radius: 5px;
            background: rgba(255,255,255,.1);
            border: 1px solid rgba(255,255,255,.15);
        }

        .complete-slot.filled {
            background: var(--holo);
            background-size: 300%;
            animation: holoShift 4s linear infinite;
            border-color: transparent;
        }

        .complete-slot.new-one {
            background: var(--holo-strong);
            background-size: 300%;
            animation: holoShift 2s linear infinite, slotNewPulse 1s ease-in-out infinite;
            border-color: transparent;
        }

        @keyframes slotNewPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,126,176,.6); }
            50% { box-shadow: 0 0 0 5px rgba(255,126,176,0); }
        }

        .complete-btns {
            display: flex;
            gap: 0.75rem;
        }

        .btn-complete-primary {
            padding: 0.75rem 1.8rem;
            border-radius: 99px;
            border: 2px solid var(--ink);
            background: var(--pink);
            color: #fff;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 4px 4px 0 rgba(255,255,255,.2);
            transition: all 0.12s;
        }

        .btn-complete-primary:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 rgba(255,255,255,.2); }
        .btn-complete-primary:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 rgba(255,255,255,.2); }

        .btn-complete-secondary {
            padding: 0.75rem 1.4rem;
            border-radius: 99px;
            border: 1.5px solid rgba(255,255,255,.25);
            background: rgba(255,255,255,.1);
            color: rgba(255,255,255,.8);
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn-complete-secondary:hover { background: rgba(255,255,255,.18); border-color: rgba(255,255,255,.4); }

        /* ── Collection View ─────────────────────────── */
        #collectionView {
            padding: 1.5rem;
            min-height: calc(100vh - 57px);
        }

        .collection-title {
            font-family: 'Caveat', cursive;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.3rem;
            align-self: flex-start;
            max-width: 560px;
            width: 100%;
        }

        .collection-sub {
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 1.5rem;
            align-self: flex-start;
            max-width: 560px;
            width: 100%;
        }

        .cassette-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            width: 100%;
            max-width: 560px;
        }

        .cassette {
            background: var(--surface);
            border: 1.5px solid var(--ink);
            border-radius: 12px;
            padding: 14px;
            box-shadow: 4px 4px 0 var(--ink);
            cursor: pointer;
            transition: all 0.12s;
        }

        .cassette:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ink); }
        .cassette:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 var(--ink); }

        .cassette.in-progress { border-style: dashed; box-shadow: 4px 4px 0 var(--muted); }

        .cassette-window {
            background: rgba(36,31,26,.06);
            border: 1px solid rgba(36,31,26,.15);
            border-radius: 6px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: space-around;
            padding: 0 10px;
            margin-bottom: 8px;
        }

        .reel {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid var(--ink);
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reel::after {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--ink);
        }

        .cassette.playing .reel {
            animation: reelSpin 2s linear infinite;
        }

        @keyframes reelSpin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .cassette-tape-line {
            height: 2px;
            width: 30px;
            background: var(--ink);
            opacity: 0.3;
        }

        .cassette-dots {
            display: flex;
            gap: 3px;
            margin-bottom: 8px;
        }

        .cassette-dot {
            flex: 1;
            height: 5px;
            border-radius: 3px;
            background: rgba(36,31,26,.08);
            border: 1px solid rgba(36,31,26,.1);
        }

        .cassette-dot.filled {
            background: var(--holo);
            background-size: 300%;
            animation: holoShift 4s linear infinite;
            border-color: transparent;
        }

        .cassette-label {
            font-family: 'Caveat', cursive;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--ink);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cassette-week {
            font-size: 0.7rem;
            color: var(--muted);
            margin-top: 2px;
        }

        .cassette-play-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            margin-top: 8px;
            padding: 0.3rem 0.6rem;
            border-radius: 99px;
            border: 1px solid var(--ink);
            background: none;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.15s;
            width: 100%;
            justify-content: center;
        }

        .cassette-play-btn:hover { background: var(--pink); color: #fff; border-color: var(--pink); }

        .cassette.in-progress .cassette-play-btn { display: none; }

        .empty-collection {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--muted);
            font-family: 'Caveat', cursive;
            font-size: 1.2rem;
        }

        .stop-melody-wrap {
            display: none;
            align-items: center;
        }

        /* ── Flash ───────────────────────────────────── */
        #flash {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0;
            background: radial-gradient(circle at center, rgba(255,126,176,.25) 0%, transparent 65%);
            transition: opacity 0.3s;
            z-index: 50;
        }
        #flash.on { opacity: 1; }

        /* ── Floating note ───────────────────────────── */
        .fnote {
            position: fixed;
            pointer-events: none;
            z-index: 60;
            font-size: 2rem;
            animation: floatNote 1.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
        }

        @keyframes floatNote {
            0%   { transform: translate(0,0) scale(0.4) rotate(0deg); opacity: 1; }
            60%  { transform: translate(-20px,-140px) scale(1.3) rotate(-15deg); opacity: 1; }
            100% { transform: translate(10px,-200px) scale(0.8) rotate(10deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div id="flash"></div>

    <!-- Session Complete Overlay -->
    <div id="sessionComplete">
        <div class="holo-disk">
            <div class="holo-disk-inner">
                <span id="newNoteSymbol">♪</span>
            </div>
        </div>
        <div class="complete-title" id="completeTitle">3번째 음 추가됐어요!</div>
        <div class="complete-sub" id="completeSub">미 · Ode to Joy · 3 / 14</div>
        <div class="complete-track" id="completeTrack"></div>
        <div class="complete-btns">
            <button class="btn-complete-secondary" id="closeCompleteBtn">닫기</button>
            <button class="btn-complete-primary" id="nextSessionBtn">다음 집중 시작 →</button>
        </div>
    </div>

    <!-- Nav -->
    <nav class="app-nav">
        <div class="nav-logo">focus <span class="holo-text">melody</span></div>
        <div class="nav-tabs">
            <button class="nav-tab active" data-view="timerView">타이머</button>
            <button class="nav-tab" data-view="collectionView">컬렉션</button>
        </div>
        <div class="week-badge">
            <span class="week-dot"></span>
            <span id="weekLabel">이번 주</span>
        </div>
    </nav>

    <!-- Timer View -->
    <div class="view active" id="timerView">

        <!-- Melody track -->
        <div class="melody-track-wrap" style="margin-top:1.2rem;">
            <div class="track-header">
                <span class="track-label">이번 주 멜로디 트랙</span>
                <span class="track-count" id="trackCount">0 / 14</span>
            </div>
            <div class="track-slots" id="trackSlots"></div>
        </div>

        <!-- Timer -->
        <div class="timer-wrapper" id="timerWrap">
            <svg class="timer-svg" viewBox="0 0 240 240">
                <defs>
                    <linearGradient id="timerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#ff7eb0"/>
                        <stop offset="50%" stop-color="#c9b3ff"/>
                        <stop offset="100%" stop-color="#7fe3c8"/>
                    </linearGradient>
                </defs>
                <circle class="timer-track" cx="120" cy="120" r="112.5"/>
                <circle class="timer-glow" cx="120" cy="120" r="112.5"/>
                <circle class="timer-progress" id="timerRing" cx="120" cy="120" r="112.5"/>
            </svg>
            <div class="timer-center">
                <div class="timer-display" id="timerDisplay">25:00</div>
                <div class="timer-status" id="timerStatus">준비</div>
            </div>
        </div>

        <!-- Duration -->
        <div class="duration-row">
            <button class="dur-btn" data-min="15">15분</button>
            <button class="dur-btn active" data-min="25">25분</button>
            <button class="dur-btn" data-min="45">45분</button>
            <button class="dur-btn" data-min="60">60분</button>
        </div>

        <!-- Controls -->
        <div class="controls">
            <button class="btn-outline" id="resetBtn">리셋</button>
            <button class="btn-start" id="startBtn">▶</button>
            <button class="btn-outline stop" id="stopMelodyBtn">■ 멈추기</button>
        </div>

        <!-- Notes -->
        <div class="notes-section">
            <div class="notes-section-header">
                <span class="track-label">쌓인 음표</span>
            </div>
            <div class="notes-grid" id="notesGrid">
                <p class="empty-hint">집중 세션을 완료하면 음이 쌓여요 🎵</p>
            </div>
            <button class="btn-play-melody" id="playBtn" disabled>♪ 멜로디 듣기</button>
            <div class="banner" id="banner">🎉 이번 주 멜로디 완성! 14번의 집중, 대단해요.</div>
        </div>
    </div>

    <!-- Collection View -->
    <div class="view" id="collectionView">
        <div class="collection-title">내 카세트 보관함</div>
        <div class="collection-sub">완성한 멜로디마다 카세트 하나. 클릭해서 다시 들을 수 있어요.</div>
        <div class="cassette-grid" id="cassetteGrid"></div>
    </div>

    <script>
        // ── Constants ──────────────────────────────────────────────
        const CIRCUMFERENCE = 2 * Math.PI * 112.5;
        const TOTAL_NOTES   = 14;
        const NOTE_STEP = 0.58;
        const NOTE_DUR  = 0.55;

        const MELODY_FREQS = [
            329.63, 329.63, 349.23, 392.00,
            392.00, 349.23, 329.63, 293.66,
            261.63, 261.63, 293.66, 329.63,
            329.63, 293.66,
        ];

        const NOTE_NAMES = ['미','미','파','솔','솔','파','미','레','도','도','레','미','미','레'];

        const NOTE_SYMBOLS = ['♩','♪','♫','♬'];

        const PALETTES = [
            ['#ff7eb0','rgba(255,126,176,.14)'],
            ['#7fe3c8','rgba(127,227,200,.14)'],
            ['#c9b3ff','rgba(201,179,255,.14)'],
            ['#ffc585','rgba(255,197,133,.14)'],
            ['#7fc8ff','rgba(127,200,255,.14)'],
            ['#ff9f7f','rgba(255,159,127,.14)'],
            ['#a8e85a','rgba(168,232,90,.14)'],
        ];

        // ── State ──────────────────────────────────────────────────
        let duration  = 25 * 60;
        let timeLeft  = duration;
        let running   = false;
        let intervalId = null;
        let loopGen   = 0;
        let loopTimeoutId = null;
        let notes   = [];
        let weekKey = '';
        let history = [];   // past completed weeks
        let audioCtx = null;

        // ── DOM ────────────────────────────────────────────────────
        const timerDisplay  = document.getElementById('timerDisplay');
        const timerStatus   = document.getElementById('timerStatus');
        const timerRing     = document.getElementById('timerRing');
        const startBtn      = document.getElementById('startBtn');
        const resetBtn      = document.getElementById('resetBtn');
        const stopMelodyBtn = document.getElementById('stopMelodyBtn');
        const playBtn       = document.getElementById('playBtn');
        const notesGrid     = document.getElementById('notesGrid');
        const trackSlots    = document.getElementById('trackSlots');
        const trackCount    = document.getElementById('trackCount');
        const banner        = document.getElementById('banner');
        const flash         = document.getElementById('flash');
        const weekLabel     = document.getElementById('weekLabel');
        const timerWrap     = document.getElementById('timerWrap');
        const sessionComplete = document.getElementById('sessionComplete');
        const completeTitle = document.getElementById('completeTitle');
        const completeSub   = document.getElementById('completeSub');
        const completeTrack = document.getElementById('completeTrack');
        const newNoteSymbol = document.getElementById('newNoteSymbol');
        const cassetteGrid  = document.getElementById('cassetteGrid');

        // ── Persistence ────────────────────────────────────────────
        function getWeekKey() {
            const d = new Date(), day = d.getDay();
            const mon = new Date(d);
            mon.setDate(d.getDate() - ((day + 6) % 7));
            return `${mon.getFullYear()}-W${mon.toISOString().slice(0,10)}`;
        }

        function weekKeyToLabel(wk) {
            const dateStr = wk.replace(/^\d{4}-W/, '');
            const d = new Date(dateStr);
            return `${d.getMonth()+1}월 ${d.getDate()}일 주`;
        }

        function loadState() {
            try {
                const s = JSON.parse(localStorage.getItem('fm_v4') || '{}');
                weekKey = getWeekKey();
                history = s.history || [];

                if (s.currentWeek && s.currentWeek.weekKey === weekKey) {
                    notes = s.currentWeek.notes || [];
                } else {
                    // Archive the old week if it had notes
                    if (s.currentWeek && s.currentWeek.notes && s.currentWeek.notes.length > 0) {
                        const oldWeek = s.currentWeek;
                        if (!history.find(h => h.weekKey === oldWeek.weekKey)) {
                            history.push({ weekKey: oldWeek.weekKey, notes: oldWeek.notes });
                        }
                    }
                    notes = [];
                }
            } catch {
                notes = [];
                weekKey = getWeekKey();
                history = [];
            }
        }

        function saveState() {
            localStorage.setItem('fm_v4', JSON.stringify({
                currentWeek: { weekKey, notes },
                history
            }));
        }

        // ── Audio ──────────────────────────────────────────────────
        function getAudioCtx() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            return audioCtx;
        }

        function playNote(freq, startAt, dur = NOTE_DUR, vol = 0.22) {
            const ctx = getAudioCtx();
            const osc = ctx.createOscillator(), osc2 = ctx.createOscillator();
            const gain = ctx.createGain(), filter = ctx.createBiquadFilter();
            osc.connect(filter); osc2.connect(filter);
            filter.connect(gain); gain.connect(ctx.destination);
            osc.type = 'sine'; osc2.type = 'triangle';
            osc.frequency.setValueAtTime(freq, startAt);
            osc2.frequency.setValueAtTime(freq * 2, startAt);
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(2200, startAt);
            gain.gain.setValueAtTime(0, startAt);
            gain.gain.linearRampToValueAtTime(vol, startAt + 0.04);
            gain.gain.setValueAtTime(vol, startAt + dur * 0.6);
            gain.gain.exponentialRampToValueAtTime(0.001, startAt + dur);
            const t = startAt + dur + 0.05;
            osc.start(startAt); osc.stop(t);
            osc2.start(startAt); osc2.stop(t);
        }

        function playMelody(noteArr, onNote) {
            const arr = noteArr || notes;
            if (!arr.length) return;
            const ctx = getAudioCtx();
            arr.forEach((_, i) => {
                const freq = MELODY_FREQS[i % MELODY_FREQS.length];
                playNote(freq, ctx.currentTime + i * NOTE_STEP + 0.08);
                if (onNote) setTimeout(() => onNote(i), (i * NOTE_STEP + 0.08) * 1000);
            });
        }

        // ── Melody loop ────────────────────────────────────────────
        function melodyDurationMs(arr) {
            const a = arr || notes;
            return ((a.length - 1) * NOTE_STEP + NOTE_DUR + 1.5) * 1000;
        }

        function startMelodyLoop(noteArr) {
            const arr = noteArr || notes;
            if (!arr.length) return;
            const myGen = ++loopGen;

            function playOnce() {
                if (myGen !== loopGen) return;
                playMelody(arr, i => highlightChip(i));
                loopTimeoutId = setTimeout(playOnce, melodyDurationMs(arr));
            }
            loopTimeoutId = setTimeout(playOnce, 600);
        }

        function stopMelodyLoop() {
            loopGen++;
            clearTimeout(loopTimeoutId);
            loopTimeoutId = null;
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
        }

        // ── Timer ──────────────────────────────────────────────────
        function fmt(s) {
            return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
        }

        function setRing(frac) {
            const offset = CIRCUMFERENCE * (1 - Math.max(0, frac));
            timerRing.style.strokeDashoffset = offset;
        }

        function tick() {
            if (timeLeft <= 0) {
                clearInterval(intervalId);
                running = false;
                startBtn.textContent = '▶';
                startBtn.classList.remove('running');
                timerStatus.textContent = '완료!';
                onComplete();
                return;
            }
            timeLeft--;
            timerDisplay.textContent = fmt(timeLeft);
            setRing(timeLeft / duration);
        }

        function startPause() {
            if (running) {
                clearInterval(intervalId);
                running = false;
                startBtn.textContent = '▶';
                startBtn.classList.remove('running');
                timerStatus.textContent = '일시정지';
            } else {
                stopMelodyLoop();
                stopMelodyBtn.style.display = 'none';
                getAudioCtx();
                running = true;
                startBtn.textContent = '⏸';
                startBtn.classList.add('running');
                timerStatus.textContent = '집중 중...';
                intervalId = setInterval(tick, 1000);
            }
        }

        function resetTimer() {
            clearInterval(intervalId);
            stopMelodyLoop();
            stopMelodyBtn.style.display = 'none';
            running = false;
            timeLeft = duration;
            timerDisplay.textContent = fmt(timeLeft);
            timerStatus.textContent = '준비';
            startBtn.textContent = '▶';
            startBtn.classList.remove('running');
            setRing(1);
        }

        // ── Session Complete ───────────────────────────────────────
        function onComplete() {
            if (notes.length < TOTAL_NOTES) {
                notes.push(notes.length);
                saveState();
                renderTrackSlots();
                renderNotes();
                spawnFloatingNote();

                flash.classList.add('on');
                setTimeout(() => flash.classList.remove('on'), 700);
            }

            if (notes.length >= TOTAL_NOTES) {
                banner.classList.add('show');
                // Archive completed week
                if (!history.find(h => h.weekKey === weekKey)) {
                    history.push({ weekKey, notes: [...notes] });
                    saveState();
                }
            }

            showSessionComplete();
        }

        function showSessionComplete() {
            const n = notes.length;
            const sym = NOTE_SYMBOLS[(n - 1) % NOTE_SYMBOLS.length];
            const noteName = NOTE_NAMES[(n - 1) % NOTE_NAMES.length];

            newNoteSymbol.textContent = sym;
            completeTitle.textContent = `${n}번째 음 추가됐어요!`;
            completeSub.textContent = `${noteName} · Ode to Joy · ${n} / ${TOTAL_NOTES}`;

            // Mini track
            completeTrack.innerHTML = Array.from({ length: TOTAL_NOTES }, (_, i) => {
                const cls = i < n - 1 ? 'filled' : i === n - 1 ? 'new-one' : '';
                return `<div class="complete-slot ${cls}"></div>`;
            }).join('');

            spawnConfetti();

            sessionComplete.classList.add('show');

            // Start melody loop
            startMelodyLoop();
        }

        function hideSessionComplete(resetAfter) {
            sessionComplete.classList.remove('show');
            if (resetAfter) {
                resetTimer();
            } else {
                // keep melody playing, show stop button
                stopMelodyBtn.style.display = '';
            }
        }

        function spawnConfetti() {
            const pieces = ['✦','✧','♪','♫','♥','★','🎵','🌸'];
            for (let i = 0; i < 18; i++) {
                setTimeout(() => {
                    const el = document.createElement('div');
                    el.className = 'confetti-piece';
                    el.textContent = pieces[Math.floor(Math.random() * pieces.length)];
                    el.style.left = Math.random() * 100 + 'vw';
                    el.style.top = '-20px';
                    el.style.setProperty('--dx', (Math.random() * 120 - 60) + 'px');
                    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
                    el.style.animationDelay = (Math.random() * 0.5) + 's';
                    el.style.fontSize = (1 + Math.random()) + 'rem';
                    document.body.appendChild(el);
                    setTimeout(() => el.remove(), 4000);
                }, i * 80);
            }
        }

        function spawnFloatingNote() {
            const r = timerWrap.getBoundingClientRect();
            const el = document.createElement('div');
            el.className = 'fnote';
            el.textContent = NOTE_SYMBOLS[notes.length % NOTE_SYMBOLS.length];
            el.style.left = (r.left + r.width / 2 - 16) + 'px';
            el.style.top  = (r.top  + r.height / 2) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1500);
        }

        function highlightChip(index) {
            const chip = notesGrid.querySelectorAll('.note-chip')[index];
            if (!chip) return;
            chip.classList.remove('lit');
            void chip.offsetWidth;
            chip.classList.add('lit');
        }

        // ── Render ─────────────────────────────────────────────────
        function renderTrackSlots() {
            trackSlots.innerHTML = Array.from({ length: TOTAL_NOTES }, (_, i) =>
                `<div class="slot ${i < notes.length ? 'filled' : ''}"></div>`
            ).join('');
            trackCount.textContent = `${notes.length} / ${TOTAL_NOTES}`;
        }

        function renderNotes() {
            playBtn.disabled = notes.length === 0;

            if (notes.length === 0) {
                notesGrid.innerHTML = '<p class="empty-hint">집중 세션을 완료하면 음이 쌓여요 🎵</p>';
                return;
            }
            notesGrid.innerHTML = notes.map((_, i) => {
                const sym = NOTE_SYMBOLS[i % NOTE_SYMBOLS.length];
                const [color, bg] = PALETTES[i % PALETTES.length];
                return `<div class="note-chip" style="background:${bg};border-color:${color};color:${color};box-shadow:2px 2px 0 ${color};">${sym}</div>`;
            }).join('');

            if (notes.length >= TOTAL_NOTES) banner.classList.add('show');
        }

        function renderCollection() {
            const allWeeks = [];

            // Past weeks from history
            history.forEach(hw => {
                if (hw.weekKey !== weekKey) allWeeks.push({ ...hw, isCurrent: false });
            });

            // Current week
            allWeeks.push({ weekKey, notes, isCurrent: true });

            // Newest first
            allWeeks.reverse();

            if (allWeeks.length === 0 || (allWeeks.length === 1 && allWeeks[0].notes.length === 0)) {
                cassetteGrid.innerHTML = '<div class="empty-collection">집중 세션을 완료하면<br>카세트가 쌓여요 🎵</div>';
                return;
            }

            cassetteGrid.innerHTML = allWeeks.map((wk, idx) => {
                if (wk.notes.length === 0) return '';
                const inProgress = wk.isCurrent && wk.notes.length < TOTAL_NOTES;
                const colors = ['#ff7eb0','#7fe3c8','#c9b3ff','#ffc585','#7fc8ff'];
                const color = colors[idx % colors.length];
                const dots = Array.from({ length: TOTAL_NOTES }, (_, i) =>
                    `<div class="cassette-dot ${i < wk.notes.length ? 'filled' : ''}"></div>`
                ).join('');
                const label = inProgress
                    ? `진행 중 · ${wk.notes.length} / ${TOTAL_NOTES}`
                    : `완성 · ${wk.notes.length} 음`;

                return `<div class="cassette ${inProgress ? 'in-progress' : ''}" data-idx="${idx}">
                    <div class="cassette-window" style="background:rgba(${hexToRgb(color)},.08)">
                        <div class="reel" style="border-color:${color}"><style>.cassette[data-idx="${idx}"] .reel::after{background:${color}}</style></div>
                        <div class="cassette-tape-line"></div>
                        <div class="reel" style="border-color:${color}"></div>
                    </div>
                    <div class="cassette-dots">${dots}</div>
                    <div class="cassette-label">${inProgress ? '이번 주' : weekKeyToLabel(wk.weekKey)}</div>
                    <div class="cassette-week">${label}</div>
                    ${!inProgress ? `<button class="cassette-play-btn" data-idx="${idx}">▶ 듣기</button>` : ''}
                </div>`;
            }).filter(Boolean).join('');

            // Bind play buttons
            cassetteGrid.querySelectorAll('.cassette-play-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const idx = parseInt(btn.dataset.idx);
                    const wk = [...allWeeks].filter(w => w.notes.length > 0).reverse()[idx] || allWeeks[idx];

                    // Actually let me find the right week
                    const allNonEmpty = allWeeks.filter(w => w.notes.length > 0);
                    const targetNotes = allNonEmpty[idx]?.notes || notes;
                    stopMelodyLoop();
                    getAudioCtx();
                    startMelodyLoop(targetNotes);
                    document.querySelectorAll('.cassette').forEach(c => c.classList.remove('playing'));
                    btn.closest('.cassette').classList.add('playing');
                    btn.textContent = '■ 멈추기';
                    btn.onclick = (ev) => {
                        ev.stopPropagation();
                        stopMelodyLoop();
                        btn.closest('.cassette').classList.remove('playing');
                        btn.textContent = '▶ 듣기';
                        btn.onclick = null;
                        btn.addEventListener('click', arguments.callee);
                    };
                });
            });
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1,3),16);
            const g = parseInt(hex.slice(3,5),16);
            const b = parseInt(hex.slice(5,7),16);
            return `${r},${g},${b}`;
        }

        function updateWeekLabel() {
            const days = ['일','월','화','수','목','금','토'];
            weekLabel.textContent = `${days[new Date().getDay()]}요일 · ${notes.length}/${TOTAL_NOTES}`;
        }

        // ── View switching ─────────────────────────────────────────
        document.querySelectorAll('.nav-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                tab.classList.add('active');
                const view = document.getElementById(tab.dataset.view);
                view.classList.add('active');
                if (tab.dataset.view === 'collectionView') renderCollection();
            });
        });

        // ── Events ─────────────────────────────────────────────────
        startBtn.addEventListener('click', startPause);
        resetBtn.addEventListener('click', resetTimer);

        stopMelodyBtn.addEventListener('click', () => {
            stopMelodyLoop();
            stopMelodyBtn.style.display = 'none';
        });

        playBtn.addEventListener('click', () => {
            getAudioCtx();
            playMelody(null, i => highlightChip(i));
        });

        document.querySelectorAll('.dur-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                if (running) return;
                document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                duration = parseInt(btn.dataset.min) * 60;
                timeLeft  = duration;
                timerDisplay.textContent = fmt(timeLeft);
                setRing(1);
            });
        });

        document.getElementById('nextSessionBtn').addEventListener('click', () => {
            hideSessionComplete(true); // reset timer
        });

        document.getElementById('closeCompleteBtn').addEventListener('click', () => {
            hideSessionComplete(false); // keep melody
        });

        // ── Init ───────────────────────────────────────────────────
        loadState();
        renderTrackSlots();
        renderNotes();
        updateWeekLabel();
        timerDisplay.textContent = fmt(timeLeft);
        setRing(1);
        setInterval(updateWeekLabel, 60_000);
    </script>
</body>
</html>
